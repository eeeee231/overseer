<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Overseer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#06080c; --bg2:#090d13; --panel:#0c1118; --panel2:#10161f; --line:rgba(120,165,225,.10); --line2:rgba(120,165,225,.22);
    --ink:#e9eef6; --muted:#8995a6; --dim:#4b5566;
    --ai:#5cc8ff; --ai2:#2f6f9f; --aiglow:rgba(92,200,255,.5);
    --go:#46d39a; --watch:#ffcf5c; --behind:#ff6b80;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  body{background-image:linear-gradient(rgba(120,165,225,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(120,165,225,.035) 1px,transparent 1px),radial-gradient(120% 60% at 50% -10%,rgba(92,200,255,.06),transparent 60%);background-size:44px 44px,44px 44px,100% 100%;}
  .app{min-height:100vh;}
  .scroll{padding:0 14px 60px;max-width:1180px;margin:0 auto;}
  .n{font-variant-numeric:tabular-nums;}

  /* HUD header */
  .hud{display:flex;justify-content:space-between;align-items:center;padding:18px 4px 14px;position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg) 70%,transparent);}
  .brand{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.42em;color:var(--ai);text-transform:uppercase;display:flex;align-items:center;gap:11px;}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--ai);box-shadow:0 0 0 0 var(--aiglow);animation:pulse 2.4s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--aiglow);}70%{box-shadow:0 0 0 7px rgba(92,200,255,0);}100%{box-shadow:0 0 0 0 rgba(92,200,255,0);}}
  .hudright{display:flex;align-items:center;gap:16px;}
  .sysline{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;}
  .sysline.go{color:var(--go);} .sysline.behind{color:var(--behind);} .sysline.dim{color:var(--dim);}
  .hudtime{font-family:var(--mono);font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}

  /* the wall grid */
  .wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(312px,1fr));gap:12px;align-items:start;}
  .mod{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:15px 16px;position:relative;overflow:hidden;}
  .mod::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(120,165,225,.25),transparent);}
  .mod.full,.mod.read,.mod.scores,.mod.ask{grid-column:1/-1;}
  .modhead{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:13px;}
  .modstat{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.12em;}
  .modstat.go{color:var(--go);} .modstat.watch{color:var(--watch);} .modstat.behind{color:var(--behind);} .modstat.dim{color:var(--dim);}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--dim);}
  .dot.go{background:var(--go);box-shadow:0 0 7px rgba(70,211,154,.5);} .dot.watch{background:var(--watch);} .dot.behind{background:var(--behind);box-shadow:0 0 7px rgba(255,107,128,.55);} .dot.dim{background:var(--dim);}

  /* read hero */
  .mod.read{background:linear-gradient(170deg,rgba(92,200,255,.10),rgba(92,200,255,.02) 60%,var(--panel));border-color:rgba(92,200,255,.28);}
  .rtag{display:flex;align-items:center;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ai);margin-bottom:12px;}
  .refresh{margin-left:auto;cursor:pointer;color:var(--ai);font-size:14px;border:1px solid var(--ai2);border-radius:7px;width:26px;height:24px;display:flex;align-items:center;justify-content:center;}
  .aih{font-size:24px;font-weight:800;letter-spacing:-.025em;line-height:1.18;}
  .air{font-size:15px;color:var(--muted);line-height:1.55;margin-top:8px;max-width:62ch;}
  .aimoves{margin-top:15px;display:flex;flex-direction:column;gap:9px;}
  .aimove{display:flex;gap:10px;font-size:14.5px;line-height:1.45;color:var(--ink);}
  .aimove::before{content:"›";color:var(--ai);font-weight:700;}
  .ainext{margin-top:15px;background:var(--ai);color:#04243c;border-radius:11px;padding:12px 15px;font-size:14px;font-weight:600;line-height:1.4;display:flex;gap:10px;align-items:baseline;max-width:fit-content;}
  .ainext b{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;opacity:.75;}
  .thinking{font-family:var(--mono);font-size:13px;color:var(--ai);letter-spacing:.03em;padding:6px 0;}

  /* scores */
  .scoregrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .score{position:relative;padding-left:14px;}
  .score::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:3px;border-radius:3px;background:var(--c,var(--dim));}
  .sk{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .sv{font-size:44px;font-weight:800;letter-spacing:-.035em;line-height:1;margin-top:8px;font-variant-numeric:tabular-nums;}
  .sv i{font-size:15px;font-style:normal;font-weight:600;color:var(--dim);}
  .ss{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:7px;color:var(--c,var(--muted));}

  /* metric tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px;}
  .vtile{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 10px;}
  .vk{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .vv{font-size:19px;font-weight:700;margin-top:5px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .vv small{font-size:9px;color:var(--dim);font-weight:500;}
  .va{font-family:var(--mono);font-size:9px;margin-top:3px;}
  .va.up{color:var(--go);} .va.down{color:var(--behind);} .va.flat{color:var(--dim);}

  /* lists: due / motion / patterns */
  .duewrap{display:flex;flex-direction:column;}
  .duerow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);}
  .duerow:first-child{border-top:0;}
  .duename{flex:1;font-size:13.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .duewhen{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;}
  .duewhen.behind{color:var(--behind);} .duewhen.watch{color:var(--watch);} .duewhen.dim{color:var(--dim);}
  .muted2{color:var(--dim);font-size:13px;}
  .ins{display:flex;gap:9px;align-items:flex-start;font-size:13px;line-height:1.5;color:var(--muted);padding:9px 0;border-top:1px solid var(--line);}
  .ins:first-of-type{border-top:0;}
  .ins .d{flex-shrink:0;margin-top:5px;width:6px;height:6px;border-radius:50%;background:var(--dim);}
  .ins.go .d{background:var(--go);} .ins.behind .d{background:var(--behind);}

  /* ask bar */
  .askbar{display:flex;gap:8px;align-items:center;}
  .askbar input{flex:1;background:var(--bg2);border:1px solid var(--line2);color:var(--ink);border-radius:11px;padding:13px 14px;font-size:14px;outline:none;font-family:var(--sans);}
  .askbar input::placeholder{color:#4c5666;}
  .micbtn,.askgo{flex-shrink:0;height:46px;border-radius:11px;border:1px solid var(--line2);background:transparent;color:var(--ai);font-size:16px;cursor:pointer;width:46px;}
  .askgo{background:var(--ai);color:#04243c;border:0;font-weight:700;}
  .askout{margin-top:11px;}
  .askout .ai{background:var(--bg2);border:1px solid var(--line);}
  .ai{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:14px;}
  .ai .tag{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ai);margin-bottom:8px;}

  /* report system rows (inside read if used) */
  .rsyswrap{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
  .rsys{border-top:1px solid var(--line);padding-top:10px;}
  .rsystop{display:flex;align-items:center;gap:8px;}
  .rsysname{font-size:13.5px;font-weight:600;}
  .rsystop .modstat{margin-left:auto;}
  .rsysnote{font-size:13px;color:var(--muted);line-height:1.5;margin-top:4px;}

  .syncline{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:18px;}
  @media (max-width:520px){ .sv{font-size:38px;} .aih{font-size:21px;} .scoregrid{gap:8px;} }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>
<body>
<div class="app">
  <div class="scroll" id="scroll"></div>
</div>
<script>
const $ = s => document.querySelector(s);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let view="home";
let LIVE={health:null,history:[],trends:{},canvas:null,courses:null,meta:null};
let COACH={};
let autospeak=false;

function fresh(){ return {
  day: today(),
  body:{sleep:7, hrv:"", rhr:"", trained:false, fuel:false, water:0},
  focus:{sessions:0, goal:3, oneThing:"", distractions:0},
  mind:{windDown:false, reflection:"", mood:3},
  create:[{t:"Loose Ends Ep 2", stage:"Idea"}],
  capture:[],
  school:[],
  work:[{t:"StartLine - next build session", due:"", done:false}],
  money:{subs:[{name:"Claude API", cost:0, cycle:"mo"}]},
  care:{day:today(), am:[{l:"LRP cleanser",d:false},{l:"Moisturizer",d:false},{l:"Sunscreen",d:false}], pm:[{l:"Cleanse",d:false},{l:"Differin / treat",d:false},{l:"Moisturize",d:false}], dates:[]},
  reading:{book:"", minutes:0},
  wins:[],
  local:[],
  call:"", briefing:"", review:""
};}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem("overseer-v5")||localStorage.getItem("overseer-v3")||"null");
    if(s){
      if(s.day!==today()){
        s.body.trained=false;s.body.fuel=false;s.body.water=0;
        s.focus.sessions=0;s.focus.oneThing="";s.focus.distractions=0;
        s.mind.windDown=false;s.mind.reflection="";
        if(s.reading) s.reading.minutes=0;
        s.call="";s.callObj=null;
        if(s.care&&s.care.day!==today()){s.care.am.forEach(x=>x.d=false);s.care.pm.forEach(x=>x.d=false);s.care.day=today();}
        s.day=today();
      }
      const f=fresh();return {...f,...s,body:{...f.body,...s.body},focus:{...f.focus,...s.focus},mind:{...f.mind,...s.mind},money:{...f.money,...s.money},care:{...f.care,...s.care},reading:{...f.reading,...(s.reading||{})}};
    }
  }catch(e){}
  return fresh();
}
let S=load();
function recordLocal(){if(!S.local)S.local=[];const e={date:today(),focus:S.focus.sessions,mood:S.mind.mood,reading:S.reading.minutes,water:S.body.water,trained:S.body.trained?1:0,care:(S.care.am.every(x=>x.d)&&S.care.pm.every(x=>x.d))?1:0};if(S.local[0]&&S.local[0].date===today())S.local[0]=e;else S.local.unshift(e);S.local=S.local.slice(0,90);}
function localSeries(key){return (S.local||[]).map(e=>e[key]);}
function localTrend(key){const vals=(S.local||[]).map(e=>e[key]).filter(v=>v!=null&&!isNaN(v));if(vals.length<2)return null;const latest=vals[0];const base=vals.slice(1,8);const avg=base.reduce((a,b)=>a+b,0)/base.length;const pct=avg?Math.round(((latest-avg)/avg)*100):null;return{latest,avg:Math.round(avg*10)/10,pct,n:vals.length};}
function save(){ recordLocal(); localStorage.setItem("overseer-v5", JSON.stringify(S)); }

function streak(dates){const set=new Set(dates||[]);let n=0,d=new Date();const f=x=>x.toISOString().slice(0,10);if(!set.has(f(d)))d.setDate(d.getDate()-1);while(set.has(f(d))){n++;d.setDate(d.getDate()-1);}return n;}
function daysUntil(due){if(!due)return 99;return Math.ceil((new Date(due+"T00:00:00")-new Date(today()+"T00:00:00"))/86400000);}
function daysAgo(date){return Math.abs(Math.ceil((new Date(today()+"T00:00:00")-new Date((date||today())+"T00:00:00"))/86400000));}
function schoolAll(){return (LIVE.canvas||[]).map(c=>({t:c.title,due:c.due,done:false,canvas:true})).concat(S.school);}

function spark(vals,cls){vals=(vals||[]).filter(v=>v!=null&&!isNaN(v)).slice(0,14).reverse();if(vals.length<2)return'';const w=160,h=36,pad=3;const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;const pts=vals.map((v,i)=>{const x=pad+i*(w-2*pad)/(vals.length-1);const y=h-pad-((v-mn)/rng)*(h-2*pad);return x.toFixed(1)+','+y.toFixed(1);}).join(' ');return `<div class="spark"><svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="var(--${cls})" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;}
function trendChip(t,goodUp){if(!t||t.pct==null)return `<span class="trend flat">- no baseline</span>`;if(t.pct===0)return `<span class="trend flat">flat vs avg</span>`;const up=t.pct>0;const good=goodUp?up:!up;return `<span class="trend ${good?'go':'behind'}">${up?'▲':'▼'}${Math.abs(t.pct)}% vs avg</span>`;}
function metric(label,v,unit,t,goodUp){return `<div class="metric"><div class="lbl">${label}</div><div class="disp" style="font-size:26px;">${v!=null&&v!==""?Math.round(v*10)/10:'-'}<span class="lbl"> ${unit}</span></div>${trendChip(t,goodUp)}</div>`;}
function arr(t,goodUp){if(!t||t.pct==null||t.pct===0)return'';const up=t.pct>0;const good=goodUp?up:!up;return `<span class="${good?'up':'down'}">${up?'▲':'▼'}</span>`;}

// Recovery read - same idea as Athlytic: today's HRV vs your baseline (weighted highest),
// resting HR vs baseline (inverted), and sleep. Computed from your own data, in your hub.
function recoveryRead(){
  const h=LIVE.health,tr=LIVE.trends||{};
  if(!h||h.hrv==null)return null;
  const clamp=x=>Math.max(0,Math.min(100,x));
  const parts=[],weights=[],factors=[];
  const hb=(tr.hrv&&tr.hrv.avg)?tr.hrv.avg:h.hrv;
  if(hb){const s=clamp(50+((h.hrv/hb)-1)*250);parts.push(s);weights.push(.5);factors.push(`HRV ${Math.round(h.hrv)} ${h.hrv>=hb?'on/above':'below'} baseline`);}
  if(h.rhr!=null){const rb=(tr.rhr&&tr.rhr.avg)?tr.rhr.avg:h.rhr;const s=clamp(50+(1-(h.rhr/rb))*250);parts.push(s);weights.push(.25);factors.push(`Rest HR ${Math.round(h.rhr)}`);}
  if(h.sleep!=null){const s=clamp((h.sleep/8)*100);parts.push(s);weights.push(.25);factors.push(`Sleep ${h.sleep}h`);}
  if(!parts.length)return null;
  const wsum=weights.reduce((a,b)=>a+b,0);
  const score=Math.round(parts.reduce((a,s,i)=>a+s*weights[i],0)/wsum);
  const cls=score>=70?"go":score>=45?"watch":"behind";
  const word=score>=70?"PUSH":score>=45?"STEADY":"RECOVER";
  const calibrating=!(tr.hrv&&tr.hrv.n>=3);
  return {score,word,cls,factors,calibrating};
}
function clean(t){return String(t==null?'':t).replace(/\*\*/g,'').replace(/(^|\n)\s*#{1,6}\s+/g,'$1').replace(/\*/g,'').replace(/`/g,'').replace(/^\s*[-•]\s+/gm,'').replace(/\n{3,}/g,'\n\n').trim();}
function strainRead(){const h=LIVE.health,tr=LIVE.trends||{};if(!h)return null;const e=h.energy,ex=h.exercise;let score=null;if(e!=null){const b=(tr.energy&&tr.energy.avg)?tr.energy.avg:e;score=Math.max(0,Math.min(100,Math.round((e/(b||e))*55)));}else if(ex!=null){score=Math.max(0,Math.min(100,Math.round(ex/60*100)));}if(score==null)return null;const word=score>=66?"HARD":score>=33?"MODERATE":"LIGHT";return{score,word,e,ex};}
function strainLine(){const sr=strainRead();if(!sr)return'';return `<div class="statline" style="text-align:center;margin:-4px 0 15px;">Today's strain ${sr.score} &middot; ${sr.word}${sr.e!=null?' &middot; '+Math.round(sr.e)+' active kcal':''}</div>`;}
function avgOf(a){a=(a||[]).filter(x=>x!=null&&!isNaN(x));return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function joinDays(){const m={};(LIVE.history||[]).forEach(h=>{const d=h.at?String(h.at).slice(0,10):null;if(d)m[d]=Object.assign(m[d]||{},{hrv:h.hrv,rhr:h.rhr,sleep:h.sleep,steps:h.steps,energy:h.energy,exercise:h.exercise});});(S.local||[]).forEach(e=>{if(e.date)m[e.date]=Object.assign(m[e.date]||{},{focus:e.focus,mood:e.mood,reading:e.reading,water:e.water,trained:e.trained,care:e.care});});return Object.keys(m).sort().reverse().map(d=>Object.assign({date:d},m[d]));}
function sleepRead(){const h=LIVE.health,tr=LIVE.trends||{};if(!h||h.sleep==null)return null;const clamp=x=>Math.max(0,Math.min(100,x));const dur=clamp((h.sleep/8)*100);const rest=[];if(h.rhr!=null){const b=(tr.rhr&&tr.rhr.avg)||h.rhr;rest.push(clamp(50+(1-(h.rhr/b))*250));}if(h.respiratory!=null){const b=(tr.respiratory&&tr.respiratory.avg)||h.respiratory;rest.push(clamp(50+(1-(h.respiratory/b))*400));}if(h.hrv!=null){const b=(tr.hrv&&tr.hrv.avg)||h.hrv;rest.push(clamp(50+((h.hrv/b)-1)*250));}const r=rest.length?rest.reduce((a,b)=>a+b,0)/rest.length:dur;const score=Math.round(.6*dur+.4*r);const cls=score>=75?"go":score>=55?"watch":"behind";return{score,cls,hours:h.sleep};}
function insights(){
  const out=[],tr=LIVE.trends||{};
  const trd=(k,goodUp,label)=>{const t=tr[k];if(t&&t.n>=4&&t.pct!=null&&Math.abs(t.pct)>=8){const up=t.pct>0,good=goodUp?up:!up;out.push({tone:good?'go':'behind',t:`${label} is ${up?'up':'down'} ${Math.abs(t.pct)}% on your baseline${good?" — trending the right way.":" — worth a look."}`});}};
  trd('hrv',true,'HRV');trd('sleep',true,'Sleep');trd('rhr',false,'Resting heart rate');trd('steps',true,'Daily movement');
  const days=joinDays(),ws=days.filter(d=>d.sleep!=null);
  if(ws.length>=6){const hi=ws.filter(d=>d.sleep>=7),lo=ws.filter(d=>d.sleep<7);if(hi.length>=2&&lo.length>=2){const mH=avgOf(hi.map(d=>d.mood)),mL=avgOf(lo.map(d=>d.mood));if(mH!=null&&mL!=null&&mH-mL>=1)out.push({tone:'go',t:`Your mood runs higher on nights you sleep 7h+ (${mH.toFixed(1)} vs ${mL.toFixed(1)} out of 5).`});const fH=avgOf(hi.map(d=>d.focus)),fL=avgOf(lo.map(d=>d.focus));if(fH!=null&&fL!=null&&fH-fL>=0.6)out.push({tone:'go',t:`You get more focus sessions in after 7h+ sleep. Protect the sleep, protect the work.`});}}
  const loc=S.local||[];
  if(loc.length>=3){let ts=0;for(const e of loc){if(e.trained)ts++;else break;}if(ts>=2)out.push({tone:'go',t:`${ts} days trained in a row. The chain is the whole game right now — don't break it.`});let dry=0;for(const e of loc){if(!e.reading)dry++;else break;}if(dry>=3)out.push({tone:'behind',t:`Reading has sat at zero ${dry} days running. One page counts — restart it today.`});}
  return out;
}
function insightLines(){return insights().map(i=>i.t).slice(0,4).join(" ");}

// ---- sub-system statuses ----
const SUBS={
  recovery(){const r=recoveryRead();if(r)return{cls:r.cls};const h=LIVE.health||{};const sl=parseFloat((h.sleep!=null?h.sleep:S.body.sleep))||0;let c=sl>=7.5?"go":sl>=6?"watch":"behind";return{cls:c};},
  sleep(){const h=LIVE.health||{};const sl=parseFloat((h.sleep!=null?h.sleep:S.body.sleep))||0;let c=sl>=7.5?"go":sl>=6?"watch":"behind";return{cls:c};},
  movement(){const h=LIVE.health||{};const st=h.steps;let c=st!=null?(st>=8000?"go":st>=4000?"watch":"behind"):(S.body.trained?"go":"watch");return{cls:c};},
  fuel(){const h=LIVE.health||{};return{cls:(h.kcal!=null||h.protein!=null)?"go":"watch"};},
  hydration(){const w=S.body.water;return{cls:w>=8?"go":w>=4?"watch":"behind"};},
  mood(){const n=(S.mind.windDown?1:0)+(S.mind.reflection?1:0);return{cls:n>=2?"go":n===1?"watch":"behind"};},
  focus(){const s=S.focus.sessions,g=S.focus.goal;return{cls:s>=g?"go":s>=1?"watch":"behind"};},

const DOMAINS=[

function domainStatus(d){const cls=d.subs.map(k=>SUBS[k]().cls);return cls.includes("behind")?"behind":cls.includes("watch")?"watch":"go";}
function domWord(c){return c==="behind"?"NEEDS YOU":c==="watch"?"STEADY":"GOOD";}
function domMetrics(key){

  if(key==="school"){const cs=LIVE.courses||[];const up=schoolAll().filter(x=>!x.done).length;const scored=cs.filter(c=>c.score!=null);const avg=scored.length?Math.round(scored.reduce((a,c)=>a+c.score,0)/scored.length):null;return `${up} due&nbsp;&nbsp;&middot;&nbsp;&nbsp;${cs.length} classes${avg!=null?`&nbsp;&nbsp;&middot;&nbsp;&nbsp;avg <b>${avg}%</b>`:''}`;}

function domRead(key){

function vArrow(t,goodUp){if(!t||t.pct==null||t.pct===0)return `<div class="va flat">— vs avg</div>`;const up=t.pct>0,good=goodUp?up:!up;return `<div class="va ${good?'up':'down'}">${up?'▲':'▼'} ${Math.abs(t.pct)}%</div>`;}

function parseAI(text){
  if(text&&typeof text==='object')return text;
  let t=String(text||'').trim().replace(/^```(json)?/i,'').replace(/```$/,'').trim();
  try{const o=JSON.parse(t);if(o&&(o.headline||o.read||o.moves||o.next))return o;}catch(e){}
  const c=clean(text);const m=c.match(/^(.{4,60}?[.!?])\s+([\s\S]+)$/);
  return m?{headline:m[1].replace(/[.!?]+$/,''),read:m[2]}:{read:c};
}
function renderAI(o,tag){if(!o)return '';o=parseAI(o);
  const head=o.headline?`<div class="aih">${esc(clean(o.headline))}</div>`:'';
  const read=o.read?`<div class="air">${esc(clean(o.read))}</div>`:'';
  const moves=(o.moves&&o.moves.length)?`<div class="aimoves">${o.moves.map(m=>`<div class="aimove">${esc(clean(m))}</div>`).join('')}</div>`:'';
  const next=o.next?`<div class="ainext"><b>Now</b><span>${esc(clean(o.next))}</span></div>`:'';
  return `<div class="ai">${tag?`<div class="tag">${tag}</div>`:''}${head}${read}${moves}${next}</div>`;
}
function spoken(o){o=parseAI(o);return [o.headline,o.read,(o.moves||[]).join('. '),o.next].filter(Boolean).join('. ');}

const SYSLABEL={cardio:"Cardiovascular",respiratory:"Respiratory & blood O₂",fitness:"Aerobic fitness",sleep:"Sleep architecture",activity:"Activity & energy",fuel:"Fuel & nutrition",gait:"Movement quality",signals:"Body signals",other:"Other signals"};

const FALLBACK_META={hrv:{label:"HRV",unit:"ms",good:true,sys:"cardio"},rhr:{label:"Resting HR",unit:"bpm",good:false,sys:"cardio"},walkinghr:{label:"Walking HR",unit:"bpm",good:false,sys:"cardio"},hrr:{label:"HR recovery",unit:"bpm",good:true,sys:"cardio"},hr_avg:{label:"Avg HR",unit:"bpm",good:false,sys:"cardio"},hr_min:{label:"Min HR",unit:"bpm",good:false,sys:"cardio"},hr_max:{label:"Max HR",unit:"bpm",good:null,sys:"cardio"},spo2:{label:"Blood O₂",unit:"%",good:true,sys:"respiratory"},respiratory:{label:"Respiratory",unit:"br/min",good:false,sys:"respiratory"},vo2max:{label:"VO₂ max",unit:"",good:true,sys:"fitness"},effort:{label:"Effort",unit:"MET",good:true,sys:"fitness"},energy:{label:"Active energy",unit:"kcal",good:true,sys:"activity"},restingenergy:{label:"Resting energy",unit:"kcal",good:null,sys:"activity"},exercise:{label:"Exercise",unit:"min",good:true,sys:"activity"},steps:{label:"Steps",unit:"",good:true,sys:"activity"},distance:{label:"Distance",unit:"km",good:true,sys:"activity"},flights:{label:"Flights",unit:"",good:true,sys:"activity"},stand:{label:"Stand",unit:"h",good:true,sys:"activity"},sleep:{label:"Asleep",unit:"h",good:true,sys:"sleep"},sleep_rem:{label:"REM",unit:"h",good:true,sys:"sleep"},sleep_deep:{label:"Deep",unit:"h",good:true,sys:"sleep"},sleep_core:{label:"Core",unit:"h",good:true,sys:"sleep"},sleep_awake:{label:"Awake",unit:"h",good:false,sys:"sleep"},sleep_inbed:{label:"In bed",unit:"h",good:null,sys:"sleep"},sleep_eff:{label:"Efficiency",unit:"%",good:true,sys:"sleep"},wristtemp:{label:"Wrist temp",unit:"°",good:null,sys:"sleep"},kcal:{label:"Fuel",unit:"kcal",good:true,sys:"fuel"},protein:{label:"Protein",unit:"g",good:true,sys:"fuel"},carbs:{label:"Carbs",unit:"g",good:true,sys:"fuel"},fat:{label:"Fat",unit:"g",good:null,sys:"fuel"},fiber:{label:"Fiber",unit:"g",good:true,sys:"fuel"},sugar:{label:"Sugar",unit:"g",good:false,sys:"fuel"},water:{label:"Water",unit:"L",good:true,sys:"fuel"},caffeine:{label:"Caffeine",unit:"mg",good:null,sys:"fuel"},sodium:{label:"Sodium",unit:"mg",good:null,sys:"fuel"},mindful:{label:"Mindful",unit:"min",good:true,sys:"signals"},daylight:{label:"Daylight",unit:"min",good:true,sys:"signals"},envaudio:{label:"Env audio",unit:"dB",good:false,sys:"signals"},headphoneaudio:{label:"Headphone",unit:"dB",good:false,sys:"signals"},bodytemp:{label:"Body temp",unit:"°",good:null,sys:"signals"}};
function metaFor(k){return (LIVE.meta&&LIVE.meta[k])||FALLBACK_META[k]||{label:k.replace(/_/g,' '),unit:"",good:null,sys:"other"};}
function fmt(v){if(v==null||v==="")return '–';const a=Math.abs(v);return a>=1000?Math.round(v).toLocaleString():a>=100?String(Math.round(v)):String(Math.round(v*10)/10);}
function arrowFor(t,good){if(!t||t.pct==null||t.pct===0)return `<div class="va flat">— vs avg</div>`;const up=t.pct>0;let cls='flat';if(good===true)cls=up?'up':'down';else if(good===false)cls=up?'down':'up';return `<div class="va ${cls}">${up?'▲':'▼'} ${Math.abs(t.pct)}%</div>`;}

function healthLine(){const h=LIVE.health,tr=LIVE.trends||{};if(!h)return "no live health yet";const LAB={hrv:"HRV",rhr:"resting HR",sleep:"sleep h",steps:"steps",energy:"active kcal",kcal:"dietary kcal",protein:"protein g",carbs:"carbs g",vo2max:"VO2max",hrr:"HR recovery",respiratory:"resp rate",spo2:"SpO2",exercise:"exercise min",stand:"stand hrs",walkinghr:"walking HR"};return Object.keys(h).filter(k=>k!=="at").map(k=>{const t=tr[k];const p=t&&t.pct!=null?` (${t.pct>0?'+':''}${t.pct}% vs baseline)`:'';return `${LAB[k]||k} ${Math.round(h[k]*10)/10}${p}`;}).join(", ");}

${pat?"Patterns I've noticed across your history: "+pat+"\n":""}Health (live, Apple Health): ${healthLine()}.

function coachPrompt(area){
  if(area.startsWith("dom-")){const d=DOMAINS.find(x=>x.key===area.slice(4));return `${snapshot()}\n\nGive me your read on my ${d?d.label:area} specifically: what's good, what needs attention, and the top 2 moves for it. Tight, direct.`;}
  const courses=(LIVE.courses||[]).map(c=>c.name+(c.score!=null?` (${Math.round(c.score)}%)`:'')).join(", ")||"not loaded";
  const sch=schoolAll().filter(x=>!x.done).map(x=>x.t+(x.due?` due ${x.due}`:"")).join("; ")||"none upcoming";
  const h=LIVE.health||{};
  switch(area){
    case "recovery": return `${snapshot()}\n\nGive me today's recovery call: one word (PUSH / STEADY / RECOVER), one line why from my HRV/RHR/sleep vs baseline, then 2 specific moves - training intensity today + one recovery lever. Fuel means eating enough, never restriction.`;
    case "sleep": return `My sleep: ${h.sleep!=null?h.sleep+'h last night':'unknown'}. Give me 2 specific, doable things to improve tonight's sleep. No generic advice.`;
    case "movement": return `${snapshot()}\n\nMovement: ${h.steps!=null?Math.round(h.steps)+' steps':'steps unknown'}${h.energy!=null?', '+Math.round(h.energy)+' active kcal':''}. I lift 3x/week. Am I moving enough on top of training, one specific thing to do today? Frame around health and energy, never burning calories to lose weight.`;
    case "fuel": return `My fuel today: ${h.kcal!=null?Math.round(h.kcal)+' kcal':'not logged'}, ${h.protein!=null?Math.round(h.protein)+'g protein':'protein unknown'}. I train for strength. Am I eating ENOUGH to train and recover, and 2 things to fuel better? Never restriction, calorie-cutting, or weight talk.`;
    case "hydration": return `I've had ${S.body.water} cups today (goal ~8). One specific nudge to hydrate, tied to training. Short.`;
    case "mood": return `${snapshot()}\n\nMood ${S.mind.mood}/5. Read my day. One grounding thing to do tonight and one honest observation. Warm but not soft.`;
    case "focus": return `${snapshot()}\n\nI keep procrastinating. My one thing is "${S.focus.oneThing||'unset'}", ${S.focus.sessions}/${S.focus.goal} sessions, ${S.focus.distractions} distractions. Name the single most important move to start, right now. One concrete action.`;
    case "reading": return `Reading "${S.reading.book||'nothing set'}", ${S.reading.minutes}m today. One nudge to keep the habit and one technique to retain more. Short.`;
    case "school": return `My classes and grades: ${courses}. Upcoming: ${sch}. For each class (especially under 85% or due soonest), a specific way to study it this week and 1-2 named free resources (e.g. Khan Academy for algebra, Paul's Online Math Notes for precalc). Concrete, prioritized. If summer with nothing due, give a light way to stay sharp for next term.`;
    case "work": return `My StartLine / work tasks: ${S.work.filter(x=>!x.done).map(x=>x.t).join("; ")||"none"}. Single next move and why that one first?`;
    case "create": return `My content pipeline: ${S.create.map(c=>c.t+" ["+c.stage+"]").join("; ")||"empty"}. I edit in Final Cut, do my own VO. What to move forward next and the one step to ship it? Push me to finish, not collect ideas.`;
    case "care": return `Skincare streak ${streak(S.care.dates)} days. One line to keep it - no product upsell.`;
    default: return `${snapshot()}\n\nLook at my ${area} and give me one specific, useful move. Short.`;
  }
}

async function review(){S.reviewObj={loading:true,read:"Reading your week…"};render();try{const hist=(LIVE.history||[]).slice(0,14).map(h=>`${h.at?h.at.slice(5,10):'?'}: ${Object.keys(h).filter(k=>k!=='at').map(k=>k+' '+h[k]).join(' ')}`).join(" | ")||"no history yet";const t=await callApi("Weekly deep review. "+snapshot()+"\n\nHealth history (recent first): "+hist+"\n\nHeadline my week, what's trending up, what's slipping, and the ONE change for next week.");S.reviewObj=parseAI(t);save();if(autospeak)speak(spoken(S.reviewObj));}catch(e){S.reviewObj={headline:"Overseer offline",read:e.message};}render();}
function speak(t){try{if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(String(t).replace(/[*#`>_~]/g,''));u.rate=1.03;speechSynthesis.speak(u);}catch(e){}}
function listen(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Voice input isn't supported in this browser - type instead. (Spoken replies still work.)");return;}try{const r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=1;r.onresult=e=>{const tx=e.results[0][0].transcript;const el=$('#ovm');if(el){el.value=tx;ask();}};r.onerror=()=>{};r.start();}catch(e){}}

function fmtTime(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function mod(cls,inner){return `<div class="mod ${cls}">${inner}</div>`;}
function sysStatusLine(){if(!LIVE.health)return{t:"Awaiting first sync",cls:"dim"};const g=bySystem();let bad=0;SYSORDER.forEach(s=>{if(g[s]&&g[s].length&&sysStatus(g[s]).cls==="behind")bad++;});return bad?{t:bad+(bad>1?" systems need":" system needs")+" attention",cls:"behind"}:{t:"All systems nominal",cls:"go"};}
function header(){const st=sysStatusLine();return `<div class="hud"><div class="brand"><span class="pulse"></span>Overseer</div><div class="hudright"><span class="sysline ${st.cls}">${st.t}</span><span class="hudtime" id="clock">${fmtTime()}</span></div></div>`;}

function readModule(){
  if(S.readLoading)return mod('read',`<div class="rtag">◆ Overseer · live read</div><div class="thinking">Reading every system…</div>`);
  const o=S.read;
  if(!o)return mod('read',`<div class="rtag">◆ Overseer · live read</div><div class="aih">Standing by.</div><div class="air">${LIVE.health?'Generating your read…':'Waiting on your first Apple Health sync to read you in.'}</div>`);
  const p=parseAI(o);
  return mod('read',`<div class="rtag">◆ Overseer · live read<span class="refresh" onclick="forceRead()">↻</span></div>
    ${p.headline?`<div class="aih">${esc(clean(p.headline))}</div>`:''}
    ${p.read?`<div class="air">${esc(clean(p.read))}</div>`:''}
    ${(p.moves&&p.moves.length)?`<div class="aimoves">${p.moves.map(m=>`<div class="aimove">${esc(clean(m))}</div>`).join('')}</div>`:''}
    ${p.next?`<div class="ainext"><b>Now</b><span>${esc(clean(p.next))}</span></div>`:''}`);
}
function scoresModule(){const r=recoveryRead(),sr=strainRead(),sq=sleepRead(),h=LIVE.health||{};
  const t=(k,v,sub,cls,u)=>`<div class="score" style="--c:var(--${cls||'dim'})"><div class="sk">${k}</div><div class="sv">${v}${u?`<i>${u}</i>`:''}</div><div class="ss">${sub}</div></div>`;
  return mod('scores',`<div class="scoregrid">
    ${r?t('Recovery',r.score,r.word,r.cls,'%'):t('Recovery','—','calibrating','dim','')}
    ${sr?t('Strain',sr.score,sr.word,sr.score>=66?'behind':sr.score>=33?'watch':'go',''):t('Strain','—','no data','dim','')}
    ${sq?t('Sleep',fmt(sq.hours),sq.score+'% qual',sq.cls,'h'):t('Sleep',(h.sleep!=null?fmt(h.sleep):'—'),'last night','dim','h')}
  </div>`);
}
function systemModules(){const g=bySystem();return SYSORDER.filter(s=>g[s]&&g[s].length).map(s=>{const st=sysStatus(g[s]);return mod('sys',`<div class="modhead"><span class="dot ${st.cls}"></span>${SYSLABEL[s]||s}<span class="modstat ${st.cls}">${st.word}</span></div><div class="tiles">${g[s].map(metricTile).join('')}</div>`);}).join('');}
function healthPatterns(){const out=[],tr=LIVE.trends||{};const trd=(k,gu,label)=>{const t=tr[k];if(t&&t.n>=4&&t.pct!=null&&Math.abs(t.pct)>=8){const up=t.pct>0,good=gu?up:!up;out.push({tone:good?'go':'behind',t:`${label} is ${up?'up':'down'} ${Math.abs(t.pct)}% on your baseline${good?' — trending the right way.':' — worth a look.'}`});}};
  trd('hrv',true,'HRV');trd('rhr',false,'Resting heart rate');trd('sleep',true,'Sleep');trd('sleep_deep',true,'Deep sleep');trd('sleep_rem',true,'REM sleep');trd('steps',true,'Daily movement');trd('vo2max',true,'VO₂ max');trd('respiratory',false,'Breathing rate');trd('protein',true,'Protein');trd('hrr',true,'Heart-rate recovery');trd('energy',true,'Active energy');return out;}
function patternsModule(){const ins=healthPatterns();if(!ins.length)return'';return mod('pat',`<div class="modhead">Patterns</div>${ins.slice(0,5).map(i=>`<div class="ins ${i.tone}"><span class="d"></span><span>${esc(i.t)}</span></div>`).join('')}`);}
function schoolModule(){const cs=LIVE.courses||[];const due=schoolAll().filter(x=>!x.done);if(!cs.length&&!due.length)return '';
  const grades=cs.length?`<div class="tiles" style="margin-bottom:12px;">${cs.map(c=>`<div class="vtile"><div class="vk">${esc(c.name||c.title||'Course')}</div><div class="vv">${c.score!=null?Math.round(c.score):'—'}${c.score!=null?'<small>%</small>':''}</div>${c.grade?`<div class="va flat">${esc(c.grade)}</div>`:''}</div>`).join('')}</div>`:'';
  const list=due.length?`<div class="duewrap">${due.slice(0,7).map(x=>{const d=daysUntil(x.due);const cls=d<0?'behind':d<=2?'watch':'dim';return `<div class="duerow"><span class="dot ${cls}"></span><span class="duename">${esc(x.t)}</span><span class="duewhen ${cls}">${x.due?(d<0?Math.abs(d)+'d late':d===0?'today':'in '+d+'d'):'—'}</span></div>`;}).join('')}</div>`:`<div class="muted2">Nothing due right now.</div>`;
  return mod('school',`<div class="modhead">School${cs.length?`<span class="modstat dim">${cs.length} classes</span>`:''}</div>${grades}${list}`);
}
function motionModule(){const proj=(S.create||[]),work=(S.work||[]).filter(x=>!x.done);const rows=[...proj.map(c=>({t:c.t,tag:c.stage})),...work.map(w=>({t:w.t,tag:'task'}))];if(!rows.length)return '';
  return mod('motion',`<div class="modhead">In motion<span class="modstat dim">${rows.length}</span></div><div class="duewrap">${rows.slice(0,8).map(r=>`<div class="duerow"><span class="dot ${r.tag==='Posted'?'go':r.tag==='Idea'?'behind':'watch'}"></span><span class="duename">${esc(r.t)}</span><span class="duewhen dim">${esc(r.tag)}</span></div>`).join('')}</div>`);
}
function askModule(){return mod('ask',`<div class="askbar"><input id="ovm" placeholder="Ask the Overseer anything…" onkeydown="if(event.key==='Enter')askWall()"><button class="micbtn" onclick="micWall()">🎙</button><button class="askgo" onclick="askWall()">→</button></div>${S.ask?(S.ask.loading?`<div class="askout"><div class="ai"><div class="thinking">Thinking…</div></div>`:`<div class="askout">${renderAI(S.ask)}</div>`):''}`);}

function renderWall(){
  return header()+`<div class="wall">
    ${readModule()}
    ${scoresModule()}
    ${systemModules()}
    ${schoolModule()}
    ${patternsModule()}
    ${motionModule()}
    ${askModule()}
  </div>
  <div class="syncline">${LIVE.health?('Live · '+Object.keys(LIVE.health).filter(k=>k!=='at').length+' signals · synced '+fmtTime()):'Awaiting Apple Health sync'}</div>`;
}

async function autoRead(force){
  if(!LIVE.health)return;
  if(!force && S.read && S.readDay===today())return;
  S.readLoading=true;render();
  try{const t=await callApi("Read me in for right now, my live state. "+snapshot());S.read=parseAI(t);S.readDay=today();}catch(e){S.read={headline:"Read unavailable",read:e.message,next:"Tap refresh to retry."};}
  S.readLoading=false;save();render();if(autospeak&&S.read)speak(spoken(S.read));
}
function forceRead(){autoRead(true);}
async function askWall(){const el=$('#ovm');if(!el)return;const q=el.value.trim();if(!q)return;el.value='';S.ask={loading:true};render();try{const t=await callApi(q+"\n\nContext: "+snapshot());S.ask=parseAI(t);save();if(autospeak)speak(spoken(S.ask));}catch(e){S.ask={headline:"Offline",read:e.message};}render();}
function micWall(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Voice input isn't supported here — type instead.");return;}try{const r=new SR();r.lang="en-US";r.interimResults=false;r.onresult=e=>{const el=$('#ovm');if(el){el.value=e.results[0][0].transcript;askWall();}};r.start();}catch(e){}}

function render(){const sc=$("#scroll");if(!sc)return;sc.innerHTML=renderWall();}
function go(key){view=key;render();}
function tick(){const c=$("#clock");if(c)c.textContent=fmtTime();}


async function loadLive(){
  try{const r=await fetch("/api/health");const d=await r.json();if(d&&d.ok){LIVE.health=d.data||null;LIVE.history=d.history||[];LIVE.trends=d.trends||{};LIVE.meta=d.meta||null;}}catch(e){}
  try{const r=await fetch("/api/canvas");const d=await r.json();if(d&&d.ok){if(Array.isArray(d.items))LIVE.canvas=d.items;if(Array.isArray(d.courses))LIVE.courses=d.courses;}}catch(e){}
  render();
}
tick();setInterval(tick,30000);
render();
loadLive().then(()=>autoRead(false));
</script>
</body>
</html>
