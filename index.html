<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Overseer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#0a0b0d; --bg2:#101216; --card:#13161b; --card2:#181c22; --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.14);
    --ink:#eef1f5; --muted:#9aa3ad; --dim:#5a626c;
    --ai:#5fa8ff; --ai-dim:#2f5a8f;
    --go:#4ecf95; --watch:#f2c14e; --behind:#ff6b7e;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;background:radial-gradient(120% 40% at 50% -8%, rgba(95,168,255,.07), transparent 60%), var(--bg);}
  .scroll{flex:1;overflow-y:auto;padding:0 16px 110px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 4px;}
  .wordmark{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.4em;color:var(--ai);text-transform:uppercase;display:flex;align-items:center;gap:8px;}
  .wordmark::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ai);box-shadow:0 0 8px var(--ai);}
  .clock{font-family:var(--mono);font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums;}
  .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);}
  .n{font-variant-numeric:tabular-nums;}

  /* home header */
  .hi{font-size:14px;color:var(--muted);font-weight:500;padding:14px 2px 2px;}
  .hi b{color:var(--ink);font-weight:600;}

  /* headline stat row */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:12px 0 4px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 12px 13px;position:relative;overflow:hidden;}
  .stat::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--dim));opacity:.9;}
  .stat .k{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
  .stat .v{font-size:34px;font-weight:700;letter-spacing:-.03em;line-height:1.05;margin-top:7px;font-variant-numeric:tabular-nums;}
  .stat .v small{font-size:13px;font-weight:600;color:var(--dim);}
  .stat .s{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;margin-top:5px;color:var(--c,var(--muted));}

  /* AI move block */
  .ai{background:linear-gradient(180deg,rgba(95,168,255,.07),rgba(95,168,255,.02));border:1px solid rgba(95,168,255,.22);border-radius:16px;padding:15px 15px 14px;margin:13px 0;}
  .ai .tag{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ai);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
  .aih{font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1.25;}
  .air{font-size:13.5px;color:var(--muted);line-height:1.5;margin-top:5px;}
  .aimoves{margin-top:12px;display:flex;flex-direction:column;gap:7px;}
  .aimove{display:flex;gap:9px;font-size:13.5px;line-height:1.4;color:var(--ink);}
  .aimove::before{content:"›";color:var(--ai);font-weight:700;}
  .ainext{margin-top:12px;background:var(--ai);color:#06243f;border-radius:11px;padding:11px 13px;font-size:13px;font-weight:600;line-height:1.35;display:flex;gap:8px;align-items:baseline;}
  .ainext b{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;opacity:.7;}
  .briefbtn{width:100%;background:var(--ai);color:#06243f;border:0;border-radius:11px;font-family:var(--mono);font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:13px;cursor:pointer;margin-top:11px;}
  .thinking{font-family:var(--mono);font-size:12px;color:var(--ai);letter-spacing:.04em;}
  .rsyswrap{margin-top:13px;display:flex;flex-direction:column;gap:11px;}
  .rsys{border-top:1px solid var(--line);padding-top:11px;}
  .rsystop{display:flex;align-items:center;gap:8px;}
  .rsysname{font-size:13.5px;font-weight:600;letter-spacing:-.01em;}
  .rsystop .dcword{margin-left:auto;}
  .rsysnote{font-size:13px;color:var(--muted);line-height:1.5;margin-top:4px;}
  .bodybtn{width:100%;background:linear-gradient(180deg,rgba(95,168,255,.14),rgba(95,168,255,.04));border:1px solid rgba(95,168,255,.3);color:var(--ai);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:13px;border-radius:13px;cursor:pointer;margin:11px 0 2px;display:flex;align-items:center;justify-content:center;gap:8px;}

  /* vitals grid */
  .sect{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin:20px 2px 9px;display:flex;justify-content:space-between;align-items:center;}
  .vit{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .vtile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 9px;}
  .vtile .vk{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
  .vtile .vv{font-size:18px;font-weight:600;margin-top:5px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .vtile .vv small{font-size:9px;color:var(--dim);font-weight:500;}
  .vtile .va{font-family:var(--mono);font-size:9px;margin-top:3px;}
  .va.up{color:var(--go);} .va.down{color:var(--behind);} .va.flat{color:var(--dim);}

  /* insight chips */
  .ins{display:flex;gap:9px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-left:2px solid var(--dim);border-radius:11px;padding:11px 12px;font-size:13px;line-height:1.45;color:var(--muted);margin-bottom:8px;}
  .ins.go{border-left-color:var(--go);} .ins.behind{border-left-color:var(--behind);}
  .ins .d{flex-shrink:0;margin-top:5px;width:6px;height:6px;border-radius:50%;background:var(--dim);}
  .ins.go .d{background:var(--go);} .ins.behind .d{background:var(--behind);}

  /* domain cards */
  .dcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;cursor:pointer;display:block;width:100%;text-align:left;color:var(--ink);}
  .dcard:active{background:var(--card2);}
  .dctop{display:flex;align-items:center;gap:9px;}
  .dcdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dcdot.go{background:var(--go);} .dcdot.watch{background:var(--watch);} .dcdot.behind{background:var(--behind);box-shadow:0 0 8px rgba(255,107,126,.6);}
  .dcname{font-size:16px;font-weight:600;letter-spacing:-.01em;}
  .dcword{margin-left:auto;font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;}
  .dcword.go{color:var(--go);} .dcword.watch{color:var(--watch);} .dcword.behind{color:var(--behind);}
  .dcchev{color:var(--dim);font-size:17px;margin-left:8px;}
  .dcmetrics{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:9px;line-height:1.6;letter-spacing:.01em;}
  .dcmetrics b{color:var(--ink);font-weight:600;}
  .dcmetrics .up{color:var(--go);} .dcmetrics .down{color:var(--behind);}

  /* detail views */
  .back{display:inline-flex;align-items:center;gap:7px;background:none;border:0;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:18px 0 2px;}
  .dtitle{font-size:27px;font-weight:700;letter-spacing:-.025em;margin:8px 0 16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:11px;}
  .subhead{font-size:15px;font-weight:600;margin:0 0 13px;letter-spacing:-.01em;}
  .item{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;background:var(--bg2);}
  .check{width:21px;height:21px;border:1px solid var(--line2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:var(--go);font-size:12px;}
  .check.on{background:rgba(78,207,149,.16);border-color:var(--go);}
  .strike{color:var(--dim);text-decoration:line-through;}
  .del{margin-left:auto;background:none;border:0;color:#3f454d;cursor:pointer;font-size:15px;padding:4px;}
  input,textarea,select{background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-size:14px;width:100%;outline:none;font-family:var(--sans);}
  input:focus,textarea:focus{border-color:var(--ai-dim);}
  input::placeholder,textarea::placeholder{color:#4c525b;}
  input[type=range]{accent-color:var(--ai);padding:0;}
  .rowflex{display:flex;gap:8px;align-items:center;}
  button.add{background:var(--ai);color:#06243f;border:0;border-radius:10px;font-weight:600;font-family:var(--mono);font-size:13px;padding:0 15px;height:44px;cursor:pointer;flex-shrink:0;}
  button.ghost{background:transparent;border:1px solid var(--line2);color:var(--ink);border-radius:10px;font-family:var(--mono);font-size:12px;letter-spacing:.05em;padding:12px;cursor:pointer;width:100%;text-transform:uppercase;}
  button.solid{background:var(--ai);color:#06243f;border:0;border-radius:10px;font-weight:600;font-family:var(--mono);font-size:12px;padding:13px;cursor:pointer;width:100%;text-transform:uppercase;letter-spacing:.06em;}
  .coachbtn{width:100%;background:rgba(95,168,255,.08);border:1px solid var(--ai-dim);color:var(--ai);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:12px;border-radius:11px;cursor:pointer;margin-top:13px;}
  .coachbtn:active{background:rgba(95,168,255,.16);}
  .coachwrap{margin-top:12px;}
  .domcoach{width:100%;background:var(--ai);color:#06243f;border:0;font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:14px;border-radius:12px;cursor:pointer;margin-bottom:13px;}
  .slabel{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px;}
  .slabel .v{font-family:var(--mono);color:var(--ink);}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);border-radius:999px;padding:7px 12px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;}
  .pill.go{color:var(--go);border-color:rgba(78,207,149,.4);} .pill.watch{color:var(--watch);border-color:rgba(242,193,78,.4);}
  .empty{border:1px dashed var(--line2);border-radius:12px;padding:16px;text-align:center;color:var(--dim);font-size:13px;}
  .statline{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:9px;line-height:1.6;}
  .disp{font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .mgrid{display:flex;gap:20px;flex-wrap:wrap;}
  .metric{display:flex;flex-direction:column;gap:3px;min-width:66px;}
  .trend{font-family:var(--mono);font-size:10px;letter-spacing:.02em;margin-top:2px;}
  .trend.go{color:var(--go);} .trend.behind{color:var(--behind);} .trend.flat{color:var(--dim);}
  .astate{font-family:var(--mono);font-size:9px;letter-spacing:.08em;}
  .astate.go{color:var(--go);} .astate.watch{color:var(--watch);} .astate.behind{color:var(--behind);}
  .dot{width:7px;height:7px;border-radius:50%;}
  .dot.go{background:var(--go);} .dot.watch{background:var(--watch);} .dot.behind{background:var(--behind);}
  .voicebtn{flex-shrink:0;width:44px;height:44px;border-radius:10px;border:1px solid var(--line2);background:transparent;color:var(--ai);font-size:17px;cursor:pointer;}
  .vtoggle{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-top:12px;cursor:pointer;}
  .vtoggle.on{color:var(--ai);}
  .spark svg{display:block;}
  .nav{position:sticky;bottom:0;display:flex;background:rgba(10,11,13,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);}
  .nav button{flex:1;background:none;border:0;color:var(--dim);padding:12px 0 17px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;}
  .nav button.on{color:var(--ai);}
  .nav .ico{font-size:15px;line-height:1;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><span class="wordmark">Overseer</span><span class="clock" id="clock"></span></div>
  <div class="scroll" id="scroll"></div>
  <nav class="nav" id="nav"></nav>
</div>
<script>
const $ = s => document.querySelector(s);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let view="home";
let LIVE={health:null,history:[],trends:{},canvas:null,courses:null,meta:null};
let COACH={};
let autospeak=false;

function fresh(){ return {
  day: today(),
  body:{sleep:7, hrv:"", rhr:"", trained:false, fuel:false, water:0},
  focus:{sessions:0, goal:3, oneThing:"", distractions:0},
  mind:{windDown:false, reflection:"", mood:3},
  create:[{t:"Loose Ends Ep 2", stage:"Idea"}],
  capture:[],
  school:[],
  work:[{t:"StartLine - next build session", due:"", done:false}],
  money:{subs:[{name:"Claude API", cost:0, cycle:"mo"}]},
  care:{day:today(), am:[{l:"LRP cleanser",d:false},{l:"Moisturizer",d:false},{l:"Sunscreen",d:false}], pm:[{l:"Cleanse",d:false},{l:"Differin / treat",d:false},{l:"Moisturize",d:false}], dates:[]},
  reading:{book:"", minutes:0},
  wins:[],
  local:[],
  call:"", briefing:"", review:""
};}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem("overseer-v5")||localStorage.getItem("overseer-v3")||"null");
    if(s){
      if(s.day!==today()){
        s.body.trained=false;s.body.fuel=false;s.body.water=0;
        s.focus.sessions=0;s.focus.oneThing="";s.focus.distractions=0;
        s.mind.windDown=false;s.mind.reflection="";
        if(s.reading) s.reading.minutes=0;
        s.call="";s.callObj=null;
        if(s.care&&s.care.day!==today()){s.care.am.forEach(x=>x.d=false);s.care.pm.forEach(x=>x.d=false);s.care.day=today();}
        s.day=today();
      }
      const f=fresh();return {...f,...s,body:{...f.body,...s.body},focus:{...f.focus,...s.focus},mind:{...f.mind,...s.mind},money:{...f.money,...s.money},care:{...f.care,...s.care},reading:{...f.reading,...(s.reading||{})}};
    }
  }catch(e){}
  return fresh();
}
let S=load();
function recordLocal(){if(!S.local)S.local=[];const e={date:today(),focus:S.focus.sessions,mood:S.mind.mood,reading:S.reading.minutes,water:S.body.water,trained:S.body.trained?1:0,care:(S.care.am.every(x=>x.d)&&S.care.pm.every(x=>x.d))?1:0};if(S.local[0]&&S.local[0].date===today())S.local[0]=e;else S.local.unshift(e);S.local=S.local.slice(0,90);}
function localSeries(key){return (S.local||[]).map(e=>e[key]);}
function localTrend(key){const vals=(S.local||[]).map(e=>e[key]).filter(v=>v!=null&&!isNaN(v));if(vals.length<2)return null;const latest=vals[0];const base=vals.slice(1,8);const avg=base.reduce((a,b)=>a+b,0)/base.length;const pct=avg?Math.round(((latest-avg)/avg)*100):null;return{latest,avg:Math.round(avg*10)/10,pct,n:vals.length};}
function save(){ recordLocal(); localStorage.setItem("overseer-v5", JSON.stringify(S)); }

function streak(dates){const set=new Set(dates||[]);let n=0,d=new Date();const f=x=>x.toISOString().slice(0,10);if(!set.has(f(d)))d.setDate(d.getDate()-1);while(set.has(f(d))){n++;d.setDate(d.getDate()-1);}return n;}
function daysUntil(due){if(!due)return 99;return Math.ceil((new Date(due+"T00:00:00")-new Date(today()+"T00:00:00"))/86400000);}
function daysAgo(date){return Math.abs(Math.ceil((new Date(today()+"T00:00:00")-new Date((date||today())+"T00:00:00"))/86400000));}
function schoolAll(){return (LIVE.canvas||[]).map(c=>({t:c.title,due:c.due,done:false,canvas:true})).concat(S.school);}

function spark(vals,cls){vals=(vals||[]).filter(v=>v!=null&&!isNaN(v)).slice(0,14).reverse();if(vals.length<2)return'';const w=160,h=36,pad=3;const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;const pts=vals.map((v,i)=>{const x=pad+i*(w-2*pad)/(vals.length-1);const y=h-pad-((v-mn)/rng)*(h-2*pad);return x.toFixed(1)+','+y.toFixed(1);}).join(' ');return `<div class="spark"><svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="var(--${cls})" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;}
function trendChip(t,goodUp){if(!t||t.pct==null)return `<span class="trend flat">- no baseline</span>`;if(t.pct===0)return `<span class="trend flat">flat vs avg</span>`;const up=t.pct>0;const good=goodUp?up:!up;return `<span class="trend ${good?'go':'behind'}">${up?'▲':'▼'}${Math.abs(t.pct)}% vs avg</span>`;}
function metric(label,v,unit,t,goodUp){return `<div class="metric"><div class="lbl">${label}</div><div class="disp" style="font-size:26px;">${v!=null&&v!==""?Math.round(v*10)/10:'-'}<span class="lbl"> ${unit}</span></div>${trendChip(t,goodUp)}</div>`;}
function arr(t,goodUp){if(!t||t.pct==null||t.pct===0)return'';const up=t.pct>0;const good=goodUp?up:!up;return `<span class="${good?'up':'down'}">${up?'▲':'▼'}</span>`;}

// Recovery read - same idea as Athlytic: today's HRV vs your baseline (weighted highest),
// resting HR vs baseline (inverted), and sleep. Computed from your own data, in your hub.
function recoveryRead(){
  const h=LIVE.health,tr=LIVE.trends||{};
  if(!h||h.hrv==null)return null;
  const clamp=x=>Math.max(0,Math.min(100,x));
  const parts=[],weights=[],factors=[];
  const hb=(tr.hrv&&tr.hrv.avg)?tr.hrv.avg:h.hrv;
  if(hb){const s=clamp(50+((h.hrv/hb)-1)*250);parts.push(s);weights.push(.5);factors.push(`HRV ${Math.round(h.hrv)} ${h.hrv>=hb?'on/above':'below'} baseline`);}
  if(h.rhr!=null){const rb=(tr.rhr&&tr.rhr.avg)?tr.rhr.avg:h.rhr;const s=clamp(50+(1-(h.rhr/rb))*250);parts.push(s);weights.push(.25);factors.push(`Rest HR ${Math.round(h.rhr)}`);}
  if(h.sleep!=null){const s=clamp((h.sleep/8)*100);parts.push(s);weights.push(.25);factors.push(`Sleep ${h.sleep}h`);}
  if(!parts.length)return null;
  const wsum=weights.reduce((a,b)=>a+b,0);
  const score=Math.round(parts.reduce((a,s,i)=>a+s*weights[i],0)/wsum);
  const cls=score>=70?"go":score>=45?"watch":"behind";
  const word=score>=70?"PUSH":score>=45?"STEADY":"RECOVER";
  const calibrating=!(tr.hrv&&tr.hrv.n>=3);
  return {score,word,cls,factors,calibrating};
}
function clean(t){return String(t==null?'':t).replace(/\*\*/g,'').replace(/(^|\n)\s*#{1,6}\s+/g,'$1').replace(/\*/g,'').replace(/`/g,'').replace(/^\s*[-•]\s+/gm,'').replace(/\n{3,}/g,'\n\n').trim();}
function strainRead(){const h=LIVE.health,tr=LIVE.trends||{};if(!h)return null;const e=h.energy,ex=h.exercise;let score=null;if(e!=null){const b=(tr.energy&&tr.energy.avg)?tr.energy.avg:e;score=Math.max(0,Math.min(100,Math.round((e/(b||e))*55)));}else if(ex!=null){score=Math.max(0,Math.min(100,Math.round(ex/60*100)));}if(score==null)return null;const word=score>=66?"HARD":score>=33?"MODERATE":"LIGHT";return{score,word,e,ex};}
function strainLine(){const sr=strainRead();if(!sr)return'';return `<div class="statline" style="text-align:center;margin:-4px 0 15px;">Today's strain ${sr.score} &middot; ${sr.word}${sr.e!=null?' &middot; '+Math.round(sr.e)+' active kcal':''}</div>`;}
function avgOf(a){a=(a||[]).filter(x=>x!=null&&!isNaN(x));return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function joinDays(){const m={};(LIVE.history||[]).forEach(h=>{const d=h.at?String(h.at).slice(0,10):null;if(d)m[d]=Object.assign(m[d]||{},{hrv:h.hrv,rhr:h.rhr,sleep:h.sleep,steps:h.steps,energy:h.energy,exercise:h.exercise});});(S.local||[]).forEach(e=>{if(e.date)m[e.date]=Object.assign(m[e.date]||{},{focus:e.focus,mood:e.mood,reading:e.reading,water:e.water,trained:e.trained,care:e.care});});return Object.keys(m).sort().reverse().map(d=>Object.assign({date:d},m[d]));}
function sleepRead(){const h=LIVE.health,tr=LIVE.trends||{};if(!h||h.sleep==null)return null;const clamp=x=>Math.max(0,Math.min(100,x));const dur=clamp((h.sleep/8)*100);const rest=[];if(h.rhr!=null){const b=(tr.rhr&&tr.rhr.avg)||h.rhr;rest.push(clamp(50+(1-(h.rhr/b))*250));}if(h.respiratory!=null){const b=(tr.respiratory&&tr.respiratory.avg)||h.respiratory;rest.push(clamp(50+(1-(h.respiratory/b))*400));}if(h.hrv!=null){const b=(tr.hrv&&tr.hrv.avg)||h.hrv;rest.push(clamp(50+((h.hrv/b)-1)*250));}const r=rest.length?rest.reduce((a,b)=>a+b,0)/rest.length:dur;const score=Math.round(.6*dur+.4*r);const cls=score>=75?"go":score>=55?"watch":"behind";return{score,cls,hours:h.sleep};}
function insights(){
  const out=[],tr=LIVE.trends||{};
  const trd=(k,goodUp,label)=>{const t=tr[k];if(t&&t.n>=4&&t.pct!=null&&Math.abs(t.pct)>=8){const up=t.pct>0,good=goodUp?up:!up;out.push({tone:good?'go':'behind',t:`${label} is ${up?'up':'down'} ${Math.abs(t.pct)}% on your baseline${good?" — trending the right way.":" — worth a look."}`});}};
  trd('hrv',true,'HRV');trd('sleep',true,'Sleep');trd('rhr',false,'Resting heart rate');trd('steps',true,'Daily movement');
  const days=joinDays(),ws=days.filter(d=>d.sleep!=null);
  if(ws.length>=6){const hi=ws.filter(d=>d.sleep>=7),lo=ws.filter(d=>d.sleep<7);if(hi.length>=2&&lo.length>=2){const mH=avgOf(hi.map(d=>d.mood)),mL=avgOf(lo.map(d=>d.mood));if(mH!=null&&mL!=null&&mH-mL>=1)out.push({tone:'go',t:`Your mood runs higher on nights you sleep 7h+ (${mH.toFixed(1)} vs ${mL.toFixed(1)} out of 5).`});const fH=avgOf(hi.map(d=>d.focus)),fL=avgOf(lo.map(d=>d.focus));if(fH!=null&&fL!=null&&fH-fL>=0.6)out.push({tone:'go',t:`You get more focus sessions in after 7h+ sleep. Protect the sleep, protect the work.`});}}
  const loc=S.local||[];
  if(loc.length>=3){let ts=0;for(const e of loc){if(e.trained)ts++;else break;}if(ts>=2)out.push({tone:'go',t:`${ts} days trained in a row. The chain is the whole game right now — don't break it.`});let dry=0;for(const e of loc){if(!e.reading)dry++;else break;}if(dry>=3)out.push({tone:'behind',t:`Reading has sat at zero ${dry} days running. One page counts — restart it today.`});}
  return out;
}

function parseAI(text){
  if(text&&typeof text==='object')return text;
  let t=String(text||'').trim().replace(/^```(json)?/i,'').replace(/```$/,'').trim();
  try{const o=JSON.parse(t);if(o&&(o.headline||o.read||o.moves||o.next))return o;}catch(e){}
  const c=clean(text);const m=c.match(/^(.{4,60}?[.!?])\s+([\s\S]+)$/);
  return m?{headline:m[1].replace(/[.!?]+$/,''),read:m[2]}:{read:c};
}

  const head=o.headline?`<div class="aih">${esc(clean(o.headline))}</div>`:'';
  const read=o.read?`<div class="air">${esc(clean(o.read))}</div>`:'';

  return `<div class="ai">${tag?`<div class="tag">${tag}</div>`:''}${head}${read}${moves}${next}</div>`;
}

const SYSLABEL={cardio:"Cardiovascular",respiratory:"Respiratory & blood O₂",fitness:"Aerobic fitness",sleep:"Sleep architecture",activity:"Activity & energy",fuel:"Fuel & nutrition",gait:"Movement quality",signals:"Body signals",other:"Other signals"};

ood:null,sys:"fuel"},sodium:{label:"Sodium",unit:"mg",good:null,sys:"fuel"},mindful:{label:"Mindful",unit:"min",good:true,sys:"signals"},daylight:{label:"Daylight",unit:"min",good:true,sys:"signals"},envaudio:{label:"Env audio",unit:"dB",good:false,sys:"signals"},headphoneaudio:{label:"Headphone",unit:"dB",good:false,sys:"signals"},bodytemp:{label:"Body temp",unit:"°",good:null,sys:"signals"}};
function metaFor(k){return (LIVE.meta&&LIVE.meta[k])||FALLBACK_META[k]||{label:k.replace(/_/g,' '),unit:"",good:null,sys:"other"};}
function fmt(v){if(v==null||v==="")return '–';const a=Math.abs(v);return a>=1000?Math.round(v).toLocaleString():a>=100?String(Math.round(v)):String(Math.round(v*10)/10);}
function arrowFor(t,good){if(!t||t.pct==null||t.pct===0)return `<div class="va flat">— vs avg</div>`;const up=t.pct>0;let cls='flat';if(good===true)cls=up?'up':'down';else if(good===false)cls=up?'down':'up';return `<div class="va ${cls}">${up?'▲':'▼'} ${Math.abs(t.pct)}%</div>`;}

function healthLine(){const h=LIVE.health,tr=LIVE.trends||{};if(!h)return "no live health yet";const LAB={hrv:"HRV",rhr:"resting HR",sleep:"sleep h",steps:"steps",energy:"active kcal",kcal:"dietary kcal",protein:"protein g",carbs:"carbs g",vo2max:"VO2max",hrr:"HR recovery",respiratory:"resp rate",spo2:"SpO2",exercise:"exercise min",stand:"stand hrs",walkinghr:"walking HR"};return Object.keys(h).filter(k=>k!=="at").map(k=>{const t=tr[k];const p=t&&t.pct!=null?` (${t.pct>0?'+':''}${t.pct}% vs baseline)`:'';return `${LAB[k]||k} ${Math.round(h[k]*10)/10}${p}`;}).join(", ");}

function coachPrompt(area){
  if(area.startsWith("dom-")){const d=DOMAINS.find(x=>x.key===area.slice(4));return `${snapshot()}\n\nGive me your read on my ${d?d.label:area} specifically: what's good, what needs attention, and the top 2 moves for it. Tight, direct.`;}
  const courses=(LIVE.courses||[]).map(c=>c.name+(c.score!=null?` (${Math.round(c.score)}%)`:'')).join(", ")||"not loaded";
  const sch=schoolAll().filter(x=>!x.done).map(x=>x.t+(x.due?` due ${x.due}`:"")).join("; ")||"none upcoming";
  const h=LIVE.health||{};
  switch(area){
    case "recovery": return `${snapshot()}\n\nGive me today's recovery call: one word (PUSH / STEADY / RECOVER), one line why from my HRV/RHR/sleep vs baseline, then 2 specific moves - training intensity today + one recovery lever. Fuel means eating enough, never restriction.`;
    case "sleep": return `My sleep: ${h.sleep!=null?h.sleep+'h last night':'unknown'}. Give me 2 specific, doable things to improve tonight's sleep. No generic advice.`;
    case "movement": return `${snapshot()}\n\nMovement: ${h.steps!=null?Math.round(h.steps)+' steps':'steps unknown'}${h.energy!=null?', '+Math.round(h.energy)+' active kcal':''}. I lift 3x/week. Am I moving enough on top of training, one specific thing to do today? Frame around health and energy, never burning calories to lose weight.`;
    case "fuel": return `My fuel today: ${h.kcal!=null?Math.round(h.kcal)+' kcal':'not logged'}, ${h.protein!=null?Math.round(h.protein)+'g protein':'protein unknown'}. I train for strength. Am I eating ENOUGH to train and recover, and 2 things to fuel better? Never restriction, calorie-cutting, or weight talk.`;
    case "hydration": return `I've had ${S.body.water} cups today (goal ~8). One specific nudge to hydrate, tied to training. Short.`;
    case "mood": return `${snapshot()}\n\nMood ${S.mind.mood}/5. Read my day. One grounding thing to do tonight and one honest observation. Warm but not soft.`;
    case "focus": return `${snapshot()}\n\nI keep procrastinating. My one thing is "${S.focus.oneThing||'unset'}", ${S.focus.sessions}/${S.focus.goal} sessions, ${S.focus.distractions} distractions. Name the single most important move to start, right now. One concrete action.`;
    case "reading": return `Reading "${S.reading.book||'nothing set'}", ${S.reading.minutes}m today. One nudge to keep the habit and one technique to retain more. Short.`;
    case "school": return `My classes and grades: ${courses}. Upcoming: ${sch}. For each class (especially under 85% or due soonest), a specific way to study it this week and 1-2 named free resources (e.g. Khan Academy for algebra, Paul's Online Math Notes for precalc). Concrete, prioritized. If summer with nothing due, give a light way to stay sharp for next term.`;
    case "work": return `My StartLine / work tasks: ${S.work.filter(x=>!x.done).map(x=>x.t).join("; ")||"none"}. Single next move and why that one first?`;
    case "create": return `My content pipeline: ${S.create.map(c=>c.t+" ["+c.stage+"]").join("; ")||"empty"}. I edit in Final Cut, do my own VO. What to move forward next and the one step to ship it? Push me to finish, not collect ideas.`;
    case "care": return `Skincare streak ${streak(S.care.dates)} days. One line to keep it - no product upsell.`;
    default: return `${snapshot()}\n\nLook at my ${area} and give me one specific, useful move. Short.`;
  }
}
async function callApi(message){const r=await fetch("/api/overseer",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({message})});const d=await r.json();if(d.error)throw new Error(d.error);return d.text||"No response.";}
async function coach(area){COACH[area]={loading:true,read:"Reading your data…"};render();try{const t=await callApi(coachPrompt(area));COACH[area]=parseAI(t);if(autospeak)speak(spoken(COACH[area]));}catch(e){COACH[area]={headline:"Couldn't reach the Overseer",read:e.message};}render();}
async function brief(){const b=$('#hbrief');if(b)b.textContent="Reading…";try{const t=await callApi("Brief me for today. "+snapshot());S.call=t;S.callObj=parseAI(t);save();if(autospeak)speak(spoken(S.callObj));}catch(e){S.callObj={headline:"Overseer offline",read:e.message};}render();}
async function brief2(){S.briefObj={loading:true,read:"Reading every system…"};render();try{const t=await callApi("Full briefing across every domain. "+snapshot());S.briefObj=parseAI(t);save();if(autospeak)speak(spoken(S.briefObj));}catch(e){S.briefObj={headline:"Overseer offline",read:e.message};}render();}
async function ask(){const el=$('#ovm');if(!el)return;const q=el.value.trim();if(!q)return;S.briefObj={loading:true,read:"Thinking…"};render();try{const t=await callApi(q+"\n\nContext: "+snapshot());S.briefObj=parseAI(t);save();if(autospeak)speak(spoken(S.briefObj));}catch(e){S.briefObj={headline:"Overseer offline",read:e.message};}render();}
async function review(){S.reviewObj={loading:true,read:"Reading your week…"};render();try{const hist=(LIVE.history||[]).slice(0,14).map(h=>`${h.at?h.at.slice(5,10):'?'}: ${Object.keys(h).filter(k=>k!=='at').map(k=>k+' '+h[k]).join(' ')}`).join(" | ")||"no history yet";const t=await callApi("Weekly deep review. "+snapshot()+"\n\nHealth history (recent first): "+hist+"\n\nHeadline my week, what's trending up, what's slipping, and the ONE change for next week.");S.reviewObj=parseAI(t);save();if(autospeak)speak(spoken(S.reviewObj));}catch(e){S.reviewObj={headline:"Overseer offline",read:e.message};}render();}
function speak(t){try{if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(String(t).replace(/[*#`>_~]/g,''));u.rate=1.03;speechSynthesis.speak(u);}catch(e){}}
function listen(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Voice input isn't supported in this browser - type instead. (Spoken replies still work.)");return;}try{const r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=1;r.onresult=e=>{const tx=e.results[0][0].transcript;const el=$('#ovm');if(el){el.value=tx;ask();}};r.onerror=()=>{};r.start();}catch(e){}}

function go(key){view=key;const sc=$("#scroll");if(sc)sc.scrollTop=0;render();}
function render(){const sc=$("#scroll");if(!sc)return;let html;if(view==="home")html=renderHome();else if(view==="overseer")html=overseerView();else if(view==="capture")html=captureView();else if(view==="review")html=reviewView();else if(view==="bodyreport")html=bodyReportView();else if(view.indexOf("d-")===0)html=domainView(view.slice(2));else html=renderHome();sc.innerHTML=html;renderNav();}
function renderNav(){const nav=$("#nav");const tabs=[["home","⌘","Today"],["capture","＋","Capture"],["overseer","◈","Overseer"]];nav.innerHTML=tabs.map(t=>{const k=t[0];const on=(view===k)||(k==='home'&&view!=='capture'&&view!=='overseer');return `<button class="${on?'on':''}" onclick="go('${k}')"><span class="ico">${t[1]}</span>${t[2]}</button>`;}).join("");}
function tick(){const c=$("#clock");if(c)c.textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
async function loadLive(){
  try{const r=await fetch("/api/health");const d=await r.json();if(d&&d.ok){LIVE.health=d.data||null;LIVE.history=d.history||[];LIVE.trends=d.trends||{};LIVE.meta=d.meta||null;}}catch(e){}
  try{const r=await fetch("/api/canvas");const d=await r.json();if(d&&d.ok){if(Array.isArray(d.items))LIVE.canvas=d.items;if(Array.isArray(d.courses))LIVE.courses=d.courses;}}catch(e){}
  render();
}
recordLocal();tick();setInterval(tick,30000);
render();
loadLive();
</script>
