<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>StartLine — Command</title>
<style>
  :root{--bg:#09090b;--panel:#18181b;--line:#27272a;--txt:#fafafa;--muted:#a1a1aa;--dim:#71717a;--amber:#fbbf24;--green:#34d399;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .wrap{max-width:480px;margin:0 auto;padding:22px 18px 60px;}
  .eyebrow{font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);}
  header{border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:20px;}
  .big{font-size:34px;font-weight:800;letter-spacing:-.02em;}
  .call{font-size:14px;font-weight:600;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;}
  .row{display:flex;align-items:center;gap:10px;}
  input,textarea{background:#0c0c0e;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px;font-size:14px;width:100%;outline:none;font-family:inherit;}
  input:focus,textarea:focus{border-color:#52525b;}
  button{border:0;border-radius:10px;font-weight:600;font-size:14px;padding:10px 14px;cursor:pointer;font-family:inherit;}
  .primary{background:var(--amber);color:#09090b;}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--txt);}
  .goal{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;}
  .check{width:22px;height:22px;border:1px solid #52525b;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:13px;}
  .check.on{background:rgba(52,211,153,.2);border-color:var(--green);color:var(--green);}
  .done{color:var(--dim);text-decoration:line-through;}
  .del{margin-left:auto;color:#3f3f46;background:none;padding:4px;}
  .slabel{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px;}
  input[type=range]{accent-color:var(--amber);padding:0;}
  .briefing{white-space:pre-wrap;line-height:1.5;font-size:14px;background:#0c0c0e;border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;}
  .mono{font-family:ui-monospace,Menlo,monospace;}
  .dim{color:var(--dim);} .amber{color:var(--amber);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="row" style="justify-content:space-between;">
      <span class="eyebrow">StartLine · Command</span>
      <span class="eyebrow" id="date"></span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px;">
      <div>
        <div class="big"><span id="doneCount">0</span><span class="dim">/<span id="totalCount">0</span></span></div>
        <div class="eyebrow" style="margin-top:2px;">goals cleared</div>
      </div>
      <div style="text-align:right;max-width:55%;">
        <div class="call amber" id="callText">no call yet</div>
        <div class="eyebrow" style="margin-top:2px;">today's call</div>
      </div>
    </div>
  </header>

  <div class="eyebrow" style="margin-bottom:10px;">Today</div>
  <div id="goals"></div>
  <div class="row" style="margin-bottom:22px;">
    <input id="goalInput" placeholder="Add a goal…" onkeydown="if(event.key==='Enter')addGoal()" />
    <button class="primary" onclick="addGoal()">Add</button>
  </div>

  <div class="card">
    <div class="eyebrow" style="margin-bottom:12px;">Body · today</div>
    <div class="slabel"><span>Sleep</span><span class="mono" id="sleepVal">7 h</span></div>
    <input type="range" min="3" max="11" step="0.5" id="sleep" oninput="onBody()" />
    <div class="slabel" style="margin-top:14px;"><span>HRV (ms)</span><span class="mono" id="hrvVal">—</span></div>
    <input id="hrv" placeholder="from your watch / Athlytic" oninput="onBody()" inputmode="numeric" />
    <div class="slabel" style="margin-top:14px;"><span>Resting HR (bpm)</span><span class="mono" id="rhrVal">—</span></div>
    <input id="rhr" placeholder="from your watch" oninput="onBody()" inputmode="numeric" />
  </div>

  <div class="card">
    <div class="row"><span class="amber">✦</span><span class="eyebrow">The Overseer</span></div>
    <div class="dim" style="font-size:12px;margin-top:4px;">Reads your goals + body and gives the call.</div>
    <div id="briefing" class="briefing" style="display:none;"></div>
    <div class="row" style="margin-top:12px;">
      <input id="msg" placeholder="Message the Overseer…" onkeydown="if(event.key==='Enter')ask()" />
      <button class="ghost" id="sendBtn" onclick="ask()">Send</button>
    </div>
    <button class="primary" style="width:100%;margin-top:8px;" id="briefBtn" onclick="brief()">Brief me</button>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const today = () => new Date().toISOString().slice(0,10);
  let state = load();

  function load(){
    try{
      const s = JSON.parse(localStorage.getItem("startline")||"null");
      if(s){ if(s.day!==today()){ s.goals=(s.goals||[]).filter(g=>!g.done&&!g.d); s.day=today(); } return s; }
    }catch(e){}
    return { day:today(), goals:[{t:"Script Loose Ends Ep 2",d:false},{t:"Train — log top sets",d:false}], sleep:7, hrv:"", rhr:"", call:"" };
  }
  function save(){ localStorage.setItem("startline", JSON.stringify(state)); }
  function esc(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function render(){
    $("date").textContent = today();
    $("callText").textContent = state.call || "no call yet";
    const g=$("goals"); g.innerHTML="";
    state.goals.forEach((goal,i)=>{
      const row=document.createElement("div"); row.className="goal";
      row.innerHTML = `<div class="check ${goal.d?'on':''}" onclick="toggle(${i})">${goal.d?'✓':''}</div>
        <span class="${goal.d?'done':''}" style="flex:1">${esc(goal.t)}</span>
        <button class="del" onclick="delGoal(${i})">✕</button>`;
      g.appendChild(row);
    });
    $("doneCount").textContent = state.goals.filter(x=>x.d).length;
    $("totalCount").textContent = state.goals.length;
    $("sleep").value=state.sleep; $("sleepVal").textContent=state.sleep+" h";
    $("hrv").value=state.hrv; $("hrvVal").textContent=state.hrv||"—";
    $("rhr").value=state.rhr; $("rhrVal").textContent=state.rhr||"—";
  }
  function addGoal(){ const v=$("goalInput").value.trim(); if(!v)return; state.goals.push({t:v,d:false}); $("goalInput").value=""; save(); render(); }
  function toggle(i){ state.goals[i].d=!state.goals[i].d; save(); render(); }
  function delGoal(i){ state.goals.splice(i,1); save(); render(); }
  function onBody(){ state.sleep=$("sleep").value; state.hrv=$("hrv").value; state.rhr=$("rhr").value; save(); render(); }

  async function callOverseer(message){
    const r = await fetch("/api/overseer",{ method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({message}) });
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    return data.text;
  }
  function showBrief(t){ const b=$("briefing"); b.style.display="block"; b.textContent=t; }

  async function brief(){
    const b=$("briefBtn"); b.disabled=true; b.textContent="Reading the signals…";
    const summary = `Goals today:\n${state.goals.map(g=>`- [${g.d?'x':' '}] ${g.t}`).join("\n")}\nLast night: ${state.sleep}h sleep, HRV ${state.hrv||'unknown'}, resting HR ${state.rhr||'unknown'}.\nGive me my briefing and today's call.`;
    try{ const text=await callOverseer(summary); state.call=text.split("\n")[0].replace(/[*#]/g,"").slice(0,40); save(); showBrief(text); render(); }
    catch(e){ showBrief("Couldn't reach the Overseer: "+e.message); }
    b.disabled=false; b.textContent="Brief me";
  }
  async function ask(){
    const m=$("msg").value.trim(); if(!m)return;
    const b=$("sendBtn"); b.disabled=true; b.textContent="…";
    try{ showBrief(await callOverseer(m)); $("msg").value=""; }
    catch(e){ showBrief("Error: "+e.message); }
    b.disabled=false; b.textContent="Send";
  }
  render();
</script>
</body>
</html>
