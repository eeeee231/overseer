<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Overseer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --bg:#0a0b0e; --bg2:#0e1014; --card:#14161c; --card2:#191c23; --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
    --txt:#f3f5f8; --muted:#9298a4; --dim:#5a606b; --ai:#52c7ff; --ai-dim:#2a6f93;
    --go:#4ddb9a; --watch:#f5b53d; --behind:#ff6b8a;
    --sans:'Sora',-apple-system,BlinkMacSystemFont,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);}
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;background:radial-gradient(130% 50% at 50% -6%, rgba(82,199,255,.10), transparent 58%), var(--bg);}
  .scroll{flex:1;overflow-y:auto;padding:0 16px 100px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 4px;}
  .wordmark{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.4em;color:var(--ai);text-transform:uppercase;}
  .clock{font-family:var(--mono);font-size:11px;color:var(--dim);}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);}
  .hero{padding:20px 2px 8px;border-bottom:1px solid var(--line);margin-bottom:18px;}
  .heroeyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ai);}
  .herocall{font-size:23px;font-weight:600;line-height:1.34;letter-spacing:-.01em;margin:13px 0 2px;color:#eef1f5;}
  .heroactions{display:flex;gap:9px;align-items:center;margin-top:16px;flex-wrap:wrap;}
  .brief{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--ai-dim);background:rgba(82,199,255,.08);color:var(--ai);font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:10px 15px;border-radius:999px;cursor:pointer;}
  .needs{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;color:var(--muted);padding:6px 0;}
  .needs.warn{color:var(--behind);}
  .sectlabel{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin:4px 2px 12px;display:flex;justify-content:space-between;}
  .band{display:flex;align-items:stretch;width:100%;text-align:left;background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;margin-bottom:12px;cursor:pointer;color:var(--txt);overflow:hidden;transition:border-color .15s,transform .08s;}
  .band:active{transform:scale(.99);}
  .band.behind{border-color:rgba(255,107,138,.30);}
  .spine{width:4px;flex-shrink:0;background:var(--dim);}
  .spine.go{background:var(--go);} .spine.watch{background:var(--watch);} .spine.behind{background:var(--behind);}
  .bandbody{flex:1;padding:16px 6px 16px 16px;min-width:0;}
  .bandtop{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .domain{font-size:21px;font-weight:700;letter-spacing:-.02em;}
  .bword{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;flex-shrink:0;}
  .bword.go{color:var(--go);} .bword.watch{color:var(--watch);} .bword.behind{color:var(--behind);}
  .bmetrics{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5;}
  .bmetrics b{color:var(--txt);font-weight:500;}
  .bmetrics .up{color:var(--go);} .bmetrics .down{color:var(--behind);}
  .bread{font-size:13.5px;color:#cdd2da;margin-top:10px;line-height:1.45;}
  .chev{display:flex;align-items:center;padding:0 15px;color:var(--dim);font-size:17px;flex-shrink:0;}
  .reviewbtn{margin-top:6px;width:100%;background:var(--card);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:14px;border-radius:14px;cursor:pointer;}
  .back{display:inline-flex;align-items:center;gap:8px;background:none;border:0;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:16px 0 4px;}
  .dtitle{font-size:28px;font-weight:700;letter-spacing:-.02em;margin:4px 0 16px;}
  .card{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:17px;margin-bottom:13px;}
  .subhead{font-size:17px;font-weight:700;margin:0 0 13px;letter-spacing:-.01em;}
  .item{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:13px;margin-bottom:8px;background:var(--bg2);}
  .check{width:22px;height:22px;border:1px solid var(--line2);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:var(--go);font-size:13px;}
  .check.on{background:rgba(77,219,154,.16);border-color:var(--go);}
  .strike{color:var(--dim);text-decoration:line-through;}
  .del{margin-left:auto;background:none;border:0;color:#3c414b;cursor:pointer;font-size:16px;padding:4px;}
  input,textarea,select{background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:12px;font-size:14px;width:100%;outline:none;font-family:var(--sans);}
  input:focus,textarea:focus{border-color:var(--ai-dim);}
  input::placeholder,textarea::placeholder{color:#4d525c;}
  input[type=range]{accent-color:var(--ai);padding:0;}
  .rowflex{display:flex;gap:9px;align-items:center;}
  button.add{background:var(--ai);color:#04222f;border:0;border-radius:11px;font-weight:700;font-family:var(--mono);font-size:13px;padding:0 16px;height:46px;cursor:pointer;flex-shrink:0;}
  button.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt);border-radius:11px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;padding:12px;cursor:pointer;width:100%;text-transform:uppercase;}
  button.solid{background:var(--ai);color:#04222f;border:0;border-radius:11px;font-weight:700;font-family:var(--mono);font-size:13px;padding:14px;cursor:pointer;width:100%;text-transform:uppercase;letter-spacing:.05em;}
  .coachbtn{width:100%;background:rgba(82,199,255,.08);border:1px solid var(--ai-dim);color:var(--ai);font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:13px;border-radius:12px;cursor:pointer;margin-top:13px;}
  .coachbtn:active{background:rgba(82,199,255,.16);}
  .coachbox{white-space:pre-wrap;line-height:1.6;font-size:14px;background:var(--bg);border:1px solid var(--line);border-left:2px solid var(--ai);border-radius:12px;padding:16px;margin-top:11px;}
  .domcoach{width:100%;background:var(--ai);color:#04222f;border:0;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:14px;border-radius:13px;cursor:pointer;margin-bottom:14px;}
  .slabel{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px;}
  .slabel .v{font-family:var(--mono);color:var(--txt);}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);border-radius:999px;padding:7px 12px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;}
  .pill.go{color:var(--go);border-color:rgba(77,219,154,.4);} .pill.watch{color:var(--watch);border-color:rgba(245,181,61,.4);}
  .empty{border:1px dashed var(--line2);border-radius:13px;padding:18px;text-align:center;color:var(--dim);font-size:13px;}
  .statline{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:10px;line-height:1.6;}
  .disp{font-weight:700;letter-spacing:-.02em;}
  .mgrid{display:flex;gap:20px;flex-wrap:wrap;}
  .metric{display:flex;flex-direction:column;gap:3px;min-width:70px;}
  .trend{font-family:var(--mono);font-size:10px;letter-spacing:.03em;margin-top:2px;}
  .trend.go{color:var(--go);} .trend.behind{color:var(--behind);} .trend.flat{color:var(--dim);}
  .astate.go{color:var(--go);} .astate.watch{color:var(--watch);} .astate.behind{color:var(--behind);}
  .astate{font-family:var(--mono);font-size:9px;letter-spacing:.1em;}
  .dot{width:7px;height:7px;border-radius:50%;}
  .dot.go{background:var(--go);} .dot.watch{background:var(--watch);} .dot.behind{background:var(--behind);}
  .voicebtn{flex-shrink:0;width:46px;height:46px;border-radius:11px;border:1px solid var(--line2);background:transparent;color:var(--ai);font-size:18px;cursor:pointer;}
  .vtoggle{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:12px;cursor:pointer;}
  .vtoggle.on{color:var(--ai);}
  .spark svg{display:block;}
  .nav{position:sticky;bottom:0;display:flex;background:rgba(10,11,14,.88);backdrop-filter:blur(16px);border-top:1px solid var(--line);}
  .nav button{flex:1;background:none;border:0;color:var(--dim);padding:13px 0 17px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;}
  .nav button.on{color:var(--ai);}
  .nav .ico{font-size:17px;line-height:1;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><span class="wordmark">Overseer</span><span class="clock" id="clock"></span></div>
  <div class="scroll" id="scroll"></div>
  <nav class="nav" id="nav"></nav>
</div>
<script>
const $ = s => document.querySelector(s);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let view="home";
let LIVE={health:null,history:[],trends:{},canvas:null,courses:null};
let COACH={};
let autospeak=false;

function fresh(){ return {
  day: today(),
  body:{sleep:7, hrv:"", rhr:"", trained:false, fuel:false, water:0},
  focus:{sessions:0, goal:3, oneThing:"", distractions:0},
  mind:{windDown:false, reflection:"", mood:3},
  create:[{t:"Loose Ends Ep 2", stage:"Idea"}],
  capture:[],
  school:[],
  work:[{t:"StartLine - next build session", due:"", done:false}],
  money:{subs:[{name:"Claude API", cost:0, cycle:"mo"}]},
  care:{day:today(), am:[{l:"LRP cleanser",d:false},{l:"Moisturizer",d:false},{l:"Sunscreen",d:false}], pm:[{l:"Cleanse",d:false},{l:"Differin / treat",d:false},{l:"Moisturize",d:false}], dates:[]},
  reading:{book:"", minutes:0},
  wins:[],
  local:[],
  call:"", briefing:"", review:""
};}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem("overseer-v5")||localStorage.getItem("overseer-v3")||"null");
    if(s){
      if(s.day!==today()){
        s.body.trained=false;s.body.fuel=false;s.body.water=0;
        s.focus.sessions=0;s.focus.oneThing="";s.focus.distractions=0;
        s.mind.windDown=false;s.mind.reflection="";
        if(s.reading) s.reading.minutes=0;
        if(s.care&&s.care.day!==today()){s.care.am.forEach(x=>x.d=false);s.care.pm.forEach(x=>x.d=false);s.care.day=today();}
        s.day=today();
      }
      const f=fresh();return {...f,...s,body:{...f.body,...s.body},focus:{...f.focus,...s.focus},mind:{...f.mind,...s.mind},money:{...f.money,...s.money},care:{...f.care,...s.care},reading:{...f.reading,...(s.reading||{})}};
    }
  }catch(e){}
  return fresh();
}
let S=load();
function recordLocal(){if(!S.local)S.local=[];const e={date:today(),focus:S.focus.sessions,mood:S.mind.mood,reading:S.reading.minutes,water:S.body.water,trained:S.body.trained?1:0,care:(S.care.am.every(x=>x.d)&&S.care.pm.every(x=>x.d))?1:0};if(S.local[0]&&S.local[0].date===today())S.local[0]=e;else S.local.unshift(e);S.local=S.local.slice(0,90);}
function localSeries(key){return (S.local||[]).map(e=>e[key]);}
function localTrend(key){const vals=(S.local||[]).map(e=>e[key]).filter(v=>v!=null&&!isNaN(v));if(vals.length<2)return null;const latest=vals[0];const base=vals.slice(1,8);const avg=base.reduce((a,b)=>a+b,0)/base.length;const pct=avg?Math.round(((latest-avg)/avg)*100):null;return{latest,avg:Math.round(avg*10)/10,pct,n:vals.length};}
function save(){ recordLocal(); localStorage.setItem("overseer-v5", JSON.stringify(S)); }

function streak(dates){const set=new Set(dates||[]);let n=0,d=new Date();const f=x=>x.toISOString().slice(0,10);if(!set.has(f(d)))d.setDate(d.getDate()-1);while(set.has(f(d))){n++;d.setDate(d.getDate()-1);}return n;}
function daysUntil(due){if(!due)return 99;return Math.ceil((new Date(due+"T00:00:00")-new Date(today()+"T00:00:00"))/86400000);}
function daysAgo(date){return Math.abs(Math.ceil((new Date(today()+"T00:00:00")-new Date((date||today())+"T00:00:00"))/86400000));}
function schoolAll(){return (LIVE.canvas||[]).map(c=>({t:c.title,due:c.due,done:false,canvas:true})).concat(S.school);}

function spark(vals,cls){vals=(vals||[]).filter(v=>v!=null&&!isNaN(v)).slice(0,14).reverse();if(vals.length<2)return'';const w=160,h=36,pad=3;const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;const pts=vals.map((v,i)=>{const x=pad+i*(w-2*pad)/(vals.length-1);const y=h-pad-((v-mn)/rng)*(h-2*pad);return x.toFixed(1)+','+y.toFixed(1);}).join(' ');return `<div class="spark"><svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="var(--${cls})" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;}
function trendChip(t,goodUp){if(!t||t.pct==null)return `<span class="trend flat">- no baseline</span>`;if(t.pct===0)return `<span class="trend flat">flat vs avg</span>`;const up=t.pct>0;const good=goodUp?up:!up;return `<span class="trend ${good?'go':'behind'}">${up?'▲':'▼'}${Math.abs(t.pct)}% vs avg</span>`;}
function metric(label,v,unit,t,goodUp){return `<div class="metric"><div class="lbl">${label}</div><div class="disp" style="font-size:26px;">${v!=null&&v!==""?Math.round(v*10)/10:'-'}<span class="lbl"> ${unit}</span></div>${trendChip(t,goodUp)}</div>`;}
function arr(t,goodUp){if(!t||t.pct==null||t.pct===0)return'';const up=t.pct>0;const good=goodUp?up:!up;return `<span class="${good?'up':'down'}">${up?'▲':'▼'}</span>`;}

// Recovery read - same idea as Athlytic: today's HRV vs your baseline (weighted highest),
// resting HR vs baseline (inverted), and sleep. Computed from your own data, in your hub.
function recoveryRead(){
  const h=LIVE.health,tr=LIVE.trends||{};
  if(!h||h.hrv==null)return null;
  const clamp=x=>Math.max(0,Math.min(100,x));
  const parts=[],weights=[],factors=[];
  const hb=(tr.hrv&&tr.hrv.avg)?tr.hrv.avg:h.hrv;
  if(hb){const s=clamp(50+((h.hrv/hb)-1)*250);parts.push(s);weights.push(.5);factors.push(`HRV ${Math.round(h.hrv)} ${h.hrv>=hb?'on/above':'below'} baseline`);}
  if(h.rhr!=null){const rb=(tr.rhr&&tr.rhr.avg)?tr.rhr.avg:h.rhr;const s=clamp(50+(1-(h.rhr/rb))*250);parts.push(s);weights.push(.25);factors.push(`Rest HR ${Math.round(h.rhr)}`);}
  if(h.sleep!=null){const s=clamp((h.sleep/8)*100);parts.push(s);weights.push(.25);factors.push(`Sleep ${h.sleep}h`);}
  if(!parts.length)return null;
  const wsum=weights.reduce((a,b)=>a+b,0);
  const score=Math.round(parts.reduce((a,s,i)=>a+s*weights[i],0)/wsum);
  const cls=score>=70?"go":score>=45?"watch":"behind";
  const word=score>=70?"PUSH":score>=45?"STEADY":"RECOVER";
  const calibrating=!(tr.hrv&&tr.hrv.n>=3);
  return {score,word,cls,factors,calibrating};
}

// ---- sub-system statuses ----
const SUBS={
  recovery(){const r=recoveryRead();if(r)return{cls:r.cls};const h=LIVE.health||{};const sl=parseFloat((h.sleep!=null?h.sleep:S.body.sleep))||0;let c=sl>=7.5?"go":sl>=6?"watch":"behind";return{cls:c};},
  sleep(){const h=LIVE.health||{};const sl=parseFloat((h.sleep!=null?h.sleep:S.body.sleep))||0;let c=sl>=7.5?"go":sl>=6?"watch":"behind";return{cls:c};},
  movement(){const h=LIVE.health||{};const st=h.steps;let c=st!=null?(st>=8000?"go":st>=4000?"watch":"behind"):(S.body.trained?"go":"watch");return{cls:c};},
  fuel(){const h=LIVE.health||{};return{cls:(h.kcal!=null||h.protein!=null)?"go":"watch"};},
  hydration(){const w=S.body.water;return{cls:w>=8?"go":w>=4?"watch":"behind"};},
  mood(){const n=(S.mind.windDown?1:0)+(S.mind.reflection?1:0);return{cls:n>=2?"go":n===1?"watch":"behind"};},
  focus(){const s=S.focus.sessions,g=S.focus.goal;return{cls:s>=g?"go":s>=1?"watch":"behind"};},
  reading(){return{cls:S.reading.minutes>0?"go":"behind"};},
  school(){const o=schoolAll().filter(x=>!x.done);const ov=o.filter(x=>daysUntil(x.due)<0).length;const so=o.filter(x=>daysUntil(x.due)>=0&&daysUntil(x.due)<=2).length;const low=(LIVE.courses||[]).some(c=>c.score!=null&&c.score<80);return{cls:ov>0||low?"behind":so>0?"watch":"go"};},
  work(){const o=S.work.filter(x=>!x.done);const ov=o.filter(x=>daysUntil(x.due)<0).length;return{cls:ov>0?"behind":o.length?"watch":"go"};},
  create(){const a=S.create.filter(c=>c.stage!=="Idea"&&c.stage!=="Posted").length;return{cls:a>0?"go":S.create.length>0?"watch":"behind"};},
  care(){const am=S.care.am.every(x=>x.d),pm=S.care.pm.every(x=>x.d);return{cls:(am&&pm)?"go":(am||pm)?"watch":"behind"};},
  money(){return{cls:"go"};},
  wins(){return{cls:S.wins.filter(w=>daysAgo(w.date)<=7).length>0?"go":"behind"};},
  inbox(){const n=S.capture.length;return{cls:n===0?"go":n<=4?"watch":"behind"};},
};
const DOMAINS=[
  {key:"body",label:"Body",subs:["recovery","sleep","movement","fuel","hydration"]},
  {key:"mind",label:"Mind",subs:["mood","focus","reading"]},
  {key:"school",label:"School",subs:["school"]},
  {key:"work",label:"Work",subs:["work","create"]},
  {key:"life",label:"Life",subs:["care","money","wins","inbox"]},
];
function domainStatus(d){const cls=d.subs.map(k=>SUBS[k]().cls);return cls.includes("behind")?"behind":cls.includes("watch")?"watch":"go";}
function domWord(c){return c==="behind"?"NEEDS YOU":c==="watch"?"STEADY":"GOOD";}
function domMetrics(key){
  const h=LIVE.health||{},tr=LIVE.trends||{};
  if(key==="body"){const r=recoveryRead();const sl=h.sleep!=null?h.sleep:S.body.sleep;const parts=[];if(r)parts.push(`Recovery <b>${r.score}%</b>`);parts.push(`Sleep <b>${sl?Math.round(sl*10)/10:'-'}h</b>${arr(tr.sleep,true)}`);if(h.hrv!=null)parts.push(`HRV <b>${Math.round(h.hrv)}</b>${arr(tr.hrv,true)}`);if(h.rhr!=null)parts.push(`Rest <b>${Math.round(h.rhr)}</b>${arr(tr.rhr,false)}`);return parts.join("&nbsp;&nbsp;&middot;&nbsp;&nbsp;");}
  if(key==="mind")return `Mood <b>${S.mind.mood}/5</b>&nbsp;&nbsp;&middot;&nbsp;&nbsp;Focus <b>${S.focus.sessions}/${S.focus.goal}</b>&nbsp;&nbsp;&middot;&nbsp;&nbsp;Read <b>${S.reading.minutes}m</b>${arr(localTrend('reading'),true)}`;
  if(key==="school"){const cs=LIVE.courses||[];const up=schoolAll().filter(x=>!x.done).length;const scored=cs.filter(c=>c.score!=null);const avg=scored.length?Math.round(scored.reduce((a,c)=>a+c.score,0)/scored.length):null;return `${up} due&nbsp;&nbsp;&middot;&nbsp;&nbsp;${cs.length} classes${avg!=null?`&nbsp;&nbsp;&middot;&nbsp;&nbsp;avg <b>${avg}%</b>`:''}`;}
  if(key==="work"){const ow=S.work.filter(x=>!x.done).length;const mv=S.create.filter(c=>c.stage!=="Idea"&&c.stage!=="Posted").length;return `<b>${ow}</b> open&nbsp;&nbsp;&middot;&nbsp;&nbsp;${S.create.length} projects&nbsp;&nbsp;&middot;&nbsp;&nbsp;${mv} in motion`;}
  if(key==="life"){const m=S.money.subs.reduce((a,s)=>a+(s.cycle==="yr"?s.cost/12:Number(s.cost)||0),0);return `Care <b>${streak(S.care.dates)}d</b>&nbsp;&nbsp;&middot;&nbsp;&nbsp;Inbox <b>${S.capture.length}</b>&nbsp;&nbsp;&middot;&nbsp;&nbsp;$${m.toFixed(0)}/mo`;}
  return "";
}
function domRead(key){

}
function coachPrompt(area){
  if(area.startsWith("dom-")){const d=DOMAINS.find(x=>x.key===area.slice(4));return `${snapshot()}\n\nGive me your read on my ${d?d.label:area} specifically: what's good, what needs attention, and the top 2 moves for it. Tight, direct.`;}
  const courses=(LIVE.courses||[]).map(c=>c.name+(c.score!=null?` (${Math.round(c.score)}%)`:'')).join(", ")||"not loaded";
  const sch=schoolAll().filter(x=>!x.done).map(x=>x.t+(x.due?` due ${x.due}`:"")).join("; ")||"none upcoming";
  const h=LIVE.health||{};
  switch(area){
    case "recovery": return `${snapshot()}\n\nGive me today's recovery call: one word (PUSH / STEADY / RECOVER), one line why from my HRV/RHR/sleep vs baseline, then 2 specific moves - training intensity today + one recovery lever. Fuel means eating enough, never restriction.`;
    case "sleep": return `My sleep: ${h.sleep!=null?h.sleep+'h last night':'unknown'}. Give me 2 specific, doable things to improve tonight's sleep. No generic advice.`;
    case "movement": return `${snapshot()}\n\nMovement: ${h.steps!=null?Math.round(h.steps)+' steps':'steps unknown'}${h.energy!=null?', '+Math.round(h.energy)+' active kcal':''}. I lift 3x/week. Am I moving enough on top of training, one specific thing to do today? Frame around health and energy, never burning calories to lose weight.`;
    case "fuel": return `My fuel today: ${h.kcal!=null?Math.round(h.kcal)+' kcal':'not logged'}, ${h.protein!=null?Math.round(h.protein)+'g protein':'protein unknown'}. I train for strength. Am I eating ENOUGH to train and recover, and 2 things to fuel better? Never restriction, calorie-cutting, or weight talk.`;
    case "hydration": return `I've had ${S.body.water} cups today (goal ~8). One specific nudge to hydrate, tied to training. Short.`;
    case "mood": return `${snapshot()}\n\nMood ${S.mind.mood}/5. Read my day. One grounding thing to do tonight and one honest observation. Warm but not soft.`;
    case "focus": return `${snapshot()}\n\nI keep procrastinating. My one thing is "${S.focus.oneThing||'unset'}", ${S.focus.sessions}/${S.focus.goal} sessions, ${S.focus.distractions} distractions. Name the single most important move to start, right now. One concrete action.`;
    case "reading": return `Reading "${S.reading.book||'nothing set'}", ${S.reading.minutes}m today. One nudge to keep the habit and one technique to retain more. Short.`;
    case "school": return `My classes and grades: ${courses}. Upcoming: ${sch}. For each class (especially under 85% or due soonest), a specific way to study it this week and 1-2 named free resources (e.g. Khan Academy for algebra, Paul's Online Math Notes for precalc). Concrete, prioritized. If summer with nothing due, give a light way to stay sharp for next term.`;
    case "work": return `My StartLine / work tasks: ${S.work.filter(x=>!x.done).map(x=>x.t).join("; ")||"none"}. Single next move and why that one first?`;
    case "create": return `My content pipeline: ${S.create.map(c=>c.t+" ["+c.stage+"]").join("; ")||"empty"}. I edit in Final Cut, do my own VO. What to move forward next and the one step to ship it? Push me to finish, not collect ideas.`;
    case "care": return `Skincare streak ${streak(S.care.dates)} days. One line to keep it - no product upsell.`;
    default: return `${snapshot()}\n\nLook at my ${area} and give me one specific, useful move. Short.`;
  }
}
async function callApi(message){const r=await fetch("/api/overseer",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({message})});const d=await r.json();if(d.error)throw new Error(d.error);return d.text||"No response.";}
async function coach(area){COACH[area]="Reading your data...";render();try{const t=await callApi(coachPrompt(area));COACH[area]=t;if(autospeak)speak(t);}catch(e){COACH[area]="Couldn't reach the Overseer: "+e.message;}render();}
async function brief(){const b=$('#hbrief');if(b)b.textContent="◈ Reading...";try{const t=await callApi("Brief me. "+snapshot()+"\n\nOne short paragraph: the call for today and the single most important move. Then a one-line PS on what's trending up or down.");S.call=t;S.briefing=t;save();if(autospeak)speak(t);}catch(e){S.call="Overseer offline: "+e.message;}render();}
async function brief2(){const b=$('#ovb');if(b)b.textContent="Reading every system...";try{const t=await callApi("Full briefing. "+snapshot()+"\n\nGo domain by domain briefly: what's good, what needs me, top 3 moves for today in priority order. Tight.");S.briefing=t;save();if(autospeak)speak(t);}catch(e){S.briefing="Overseer offline: "+e.message;}render();}
async function ask(){const el=$('#ovm');if(!el)return;const q=el.value.trim();if(!q)return;S.briefing="Thinking...";render();try{const t=await callApi(q+"\n\nContext: "+snapshot());S.briefing=t;save();if(autospeak)speak(t);}catch(e){S.briefing="Overseer offline: "+e.message;}render();}
async function review(){const b=$('#rvb');if(b)b.textContent="Thinking hard...";S.review="Reading your week...";render();try{const hist=(LIVE.history||[]).slice(0,14).map(h=>`${h.at?h.at.slice(5,10):'?'}: ${Object.keys(h).filter(k=>k!=='at').map(k=>k+' '+h[k]).join(' ')}`).join(" | ")||"no history yet";const t=await callApi("Weekly deep review. "+snapshot()+"\n\nHealth history (recent first): "+hist+"\n\nGive me: 1) honest headline on my week, 2) what's trending up, 3) what's slipping, 4) the ONE change for next week. Direct.");S.review=t;save();if(autospeak)speak(t);}catch(e){S.review="Overseer offline: "+e.message;}render();}
function speak(t){try{if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(String(t).replace(/[*#`>_~]/g,''));u.rate=1.03;speechSynthesis.speak(u);}catch(e){}}
function listen(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Voice input isn't supported in this browser - type instead. (Spoken replies still work.)");return;}try{const r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=1;r.onresult=e=>{const tx=e.results[0][0].transcript;const el=$('#ovm');if(el){el.value=tx;ask();}};r.onerror=()=>{};r.start();}catch(e){}}

function go(key){view=key;const sc=$("#scroll");if(sc)sc.scrollTop=0;render();}
function render(){const sc=$("#scroll");if(!sc)return;let html;if(view==="home")html=renderHome();else if(view==="overseer")html=overseerView();else if(view==="capture")html=captureView();else if(view==="review")html=reviewView();else if(view.indexOf("d-")===0)html=domainView(view.slice(2));else html=renderHome();sc.innerHTML=html;renderNav();}
function renderNav(){const nav=$("#nav");const tabs=[["home","⌘","Today"],["capture","＋","Capture"],["overseer","◈","Overseer"]];nav.innerHTML=tabs.map(t=>{const k=t[0];const on=(view===k)||(k==='home'&&view!=='capture'&&view!=='overseer');return `<button class="${on?'on':''}" onclick="go('${k}')"><span class="ico">${t[1]}</span>${t[2]}</button>`;}).join("");}
function tick(){const c=$("#clock");if(c)c.textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
async function loadLive(){
  try{const r=await fetch("/api/health");const d=await r.json();if(d&&d.ok){LIVE.health=d.data||null;LIVE.history=d.history||[];LIVE.trends=d.trends||{};}}catch(e){}
  try{const r=await fetch("/api/canvas");const d=await r.json();if(d&&d.ok){if(Array.isArray(d.items))LIVE.canvas=d.items;if(Array.isArray(d.courses))LIVE.courses=d.courses;}}catch(e){}
  render();
}
recordLocal();tick();setInterval(tick,30000);
render();
loadLive();
</script>
