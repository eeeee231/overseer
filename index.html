<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Overseer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --bg:#0a0b0e; --bg2:#0e1014; --card:#14161c; --card2:#191c23; --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
    --txt:#f3f5f8; --muted:#9298a4; --dim:#5a606b; --ai:#52c7ff; --ai-dim:#2a6f93;
    --go:#4ddb9a; --watch:#f5b53d; --behind:#ff6b8a;
    --sans:'Sora',-apple-system,BlinkMacSystemFont,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);}
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;background:radial-gradient(120% 60% at 50% -8%, rgba(82,199,255,.09), transparent 60%), var(--bg);}
  .scroll{flex:1;overflow-y:auto;padding:0 16px 100px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 8px;}
  .wordmark{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.38em;color:var(--ai);text-transform:uppercase;}
  .clock{font-family:var(--mono);font-size:11px;color:var(--dim);}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);}
  .core{display:flex;flex-direction:column;align-items:center;padding:14px 0 8px;text-align:center;}
  .coremeta{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
  .ringwrap{position:relative;width:188px;height:188px;}
  .ringwrap .glow{position:absolute;inset:18px;border-radius:50%;filter:blur(26px);opacity:.5;z-index:0;}
  .ringwrap svg{position:relative;z-index:1;}
  .corecenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
  .corepct{font-size:46px;font-weight:700;line-height:1;letter-spacing:-.02em;}
  .coreword{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.16em;margin-top:6px;}
  .callline{font-size:16px;font-weight:500;line-height:1.4;max-width:300px;margin:16px auto 0;color:#dfe3ea;}
  .brief{margin-top:14px;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);background:rgba(82,199,255,.06);color:var(--ai);font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;border-radius:999px;cursor:pointer;}
  .ringprog.anim{animation:draw 1.05s cubic-bezier(.4,0,.2,1) forwards;}
  @keyframes draw{from{stroke-dashoffset:var(--circ);}to{stroke-dashoffset:var(--off);}}
  .rg-go{stroke:var(--go);} .rg-watch{stroke:var(--watch);} .rg-behind{stroke:var(--behind);} .rg-ai{stroke:var(--ai);}
  .glow-go{background:var(--go);} .glow-watch{background:var(--watch);} .glow-behind{background:var(--behind);} .glow-ai{background:var(--ai);}
  .gridhead{display:flex;align-items:center;justify-content:space-between;margin:22px 4px 12px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .acard{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:15px 14px 14px;cursor:pointer;text-align:left;color:var(--txt);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;gap:8px;transition:border-color .15s,transform .1s;}
  .acard:active{transform:scale(.98);}
  .acard.behind{border-color:rgba(255,107,138,.32);}
  .acard-top{width:100%;display:flex;align-items:center;justify-content:space-between;}
  .acard-top .alabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .mini-center{font-size:15px;font-weight:700;letter-spacing:-.01em;}
  .astate{font-family:var(--mono);font-size:9px;letter-spacing:.1em;}
  .astate.go{color:var(--go);} .astate.watch{color:var(--watch);} .astate.behind{color:var(--behind);}
  .dot{width:7px;height:7px;border-radius:50%;}
  .dot.go{background:var(--go);} .dot.watch{background:var(--watch);} .dot.behind{background:var(--behind);}
  .acard.behind .dot{animation:pulse 1.7s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .reviewbtn{margin-top:14px;width:100%;background:var(--card);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:13px;border-radius:14px;cursor:pointer;}
  .back{display:inline-flex;align-items:center;gap:8px;background:none;border:0;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:16px 0 4px;}
  .dtitle{font-size:27px;font-weight:700;letter-spacing:-.02em;margin:4px 0 16px;}
  .card{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:17px;margin-bottom:13px;}
  .card .lbl{margin-bottom:13px;}
  .item{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:13px;margin-bottom:8px;background:var(--bg2);}
  .check{width:22px;height:22px;border:1px solid var(--line2);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:var(--go);font-size:13px;}
  .check.on{background:rgba(77,219,154,.16);border-color:var(--go);}
  .strike{color:var(--dim);text-decoration:line-through;}
  .del{margin-left:auto;background:none;border:0;color:#3c414b;cursor:pointer;font-size:16px;padding:4px;}
  input,textarea,select{background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:12px;font-size:14px;width:100%;outline:none;font-family:var(--sans);}
  input:focus,textarea:focus{border-color:var(--ai-dim);}
  input::placeholder,textarea::placeholder{color:#4d525c;}
  input[type=range]{accent-color:var(--ai);padding:0;}
  .rowflex{display:flex;gap:9px;align-items:center;}
  button.add{background:var(--ai);color:#04222f;border:0;border-radius:11px;font-weight:700;font-family:var(--mono);font-size:13px;padding:0 16px;height:46px;cursor:pointer;flex-shrink:0;}
  button.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt);border-radius:11px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;padding:12px;cursor:pointer;width:100%;text-transform:uppercase;}
  button.solid{background:var(--ai);color:#04222f;border:0;border-radius:11px;font-weight:700;font-family:var(--mono);font-size:13px;padding:14px;cursor:pointer;width:100%;text-transform:uppercase;letter-spacing:.05em;}
  .coachbtn{width:100%;background:rgba(82,199,255,.08);border:1px solid var(--ai-dim);color:var(--ai);font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:14px;border-radius:13px;cursor:pointer;margin-bottom:13px;}
  .coachbtn:active{background:rgba(82,199,255,.16);}
  .coachbox{white-space:pre-wrap;line-height:1.6;font-size:14px;background:var(--bg);border:1px solid var(--line);border-left:2px solid var(--ai);border-radius:12px;padding:16px;margin-bottom:13px;}
  .slabel{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px;}
  .slabel .v{font-family:var(--mono);color:var(--txt);}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);border-radius:999px;padding:7px 12px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;}
  .pill.go{color:var(--go);border-color:rgba(77,219,154,.4);} .pill.watch{color:var(--watch);border-color:rgba(245,181,61,.4);}
  .empty{border:1px dashed var(--line2);border-radius:13px;padding:20px;text-align:center;color:var(--dim);font-size:13px;}
  .statline{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:10px;line-height:1.6;}
  .disp{font-weight:700;letter-spacing:-.02em;}
  .mgrid{display:flex;gap:20px;flex-wrap:wrap;}
  .metric{display:flex;flex-direction:column;gap:3px;min-width:72px;}
  .trend{font-family:var(--mono);font-size:10px;letter-spacing:.03em;margin-top:2px;}
  .trend.go{color:var(--go);} .trend.behind{color:var(--behind);} .trend.flat{color:var(--dim);}
  .voicebtn{flex-shrink:0;width:46px;height:46px;border-radius:11px;border:1px solid var(--line2);background:transparent;color:var(--ai);font-size:18px;cursor:pointer;}
  .vtoggle{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:12px;cursor:pointer;}
  .vtoggle.on{color:var(--ai);}
  .nav{position:sticky;bottom:0;display:flex;background:rgba(10,11,14,.86);backdrop-filter:blur(16px);border-top:1px solid var(--line);}
  .nav button{flex:1;background:none;border:0;color:var(--dim);padding:13px 0 17px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;}
  .nav button.on{color:var(--ai);}
  .nav .ico{font-size:17px;line-height:1;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;}.ringprog.anim{stroke-dashoffset:var(--off)!important;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><span class="wordmark">Overseer</span><span class="clock" id="clock"></span></div>
  <div class="scroll" id="scroll"></div>
  <nav class="nav" id="nav"></nav>
</div>
<script>
const $ = s => document.querySelector(s);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let view="home";
let LIVE={health:null,history:[],trends:{},canvas:null,courses:null};
let COACH={};
let autospeak=false;

function fresh(){ return {
  day: today(),
  body:{sleep:7, hrv:"", rhr:"", trained:false, fuel:false, water:0},
  focus:{sessions:0, goal:3, oneThing:"", distractions:0},
  mind:{windDown:false, reflection:"", mood:3},
  create:[{t:"Loose Ends Ep 2", stage:"Idea"}],
  capture:[],
  school:[],
  work:[{t:"StartLine - next build session", due:"", done:false}],
  money:{subs:[{name:"Claude API", cost:0, cycle:"mo"}]},
  care:{day:today(), am:[{l:"LRP cleanser",d:false},{l:"Moisturizer",d:false},{l:"Sunscreen",d:false}], pm:[{l:"Cleanse",d:false},{l:"Differin / treat",d:false},{l:"Moisturize",d:false}], dates:[]},
  reading:{book:"", minutes:0},
  wins:[],
  call:"", briefing:"", review:""
};}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem("overseer-v5")||localStorage.getItem("overseer-v3")||"null");
    if(s){
      if(s.day!==today()){
        s.body.trained=false;s.body.fuel=false;s.body.water=0;
        s.focus.sessions=0;s.focus.oneThing="";s.focus.distractions=0;
        s.mind.windDown=false;s.mind.reflection="";
        if(s.reading) s.reading.minutes=0;
        if(s.care&&s.care.day!==today()){s.care.am.forEach(x=>x.d=false);s.care.pm.forEach(x=>x.d=false);s.care.day=today();}
        s.day=today();
      }
      const f=fresh();return {...f,...s,body:{...f.body,...s.body},focus:{...f.focus,...s.focus},mind:{...f.mind,...s.mind},money:{...f.money,...s.money},care:{...f.care,...s.care},reading:{...f.reading,...(s.reading||{})}};
    }
  }catch(e){}
  return fresh();
}
let S=load();
function save(){ localStorage.setItem("overseer-v5", JSON.stringify(S)); }

function streak(dates){const set=new Set(dates||[]);let n=0,d=new Date();const f=x=>x.toISOString().slice(0,10);if(!set.has(f(d)))d.setDate(d.getDate()-1);while(set.has(f(d))){n++;d.setDate(d.getDate()-1);}return n;}
function daysUntil(due){if(!due)return 99;return Math.ceil((new Date(due+"T00:00:00")-new Date(today()+"T00:00:00"))/86400000);}
function daysAgo(date){return Math.abs(Math.ceil((new Date(today()+"T00:00:00")-new Date((date||today())+"T00:00:00"))/86400000));}
function schoolAll(){return (LIVE.canvas||[]).map(c=>({t:c.title,due:c.due,done:false,canvas:true})).concat(S.school);}

const AREAS=[
  {key:"body",label:"Body",status(){const h=LIVE.health||{};const sl=parseFloat((h.sleep!=null?h.sleep:S.body.sleep))||0;const hv=h.hrv!=null?h.hrv:S.body.hrv;let c=sl>=7.5?"go":sl>=6?"watch":"behind";return{cls:c,word:{go:"RECOVERED",watch:"STEADY",behind:"LOW"}[c],val:hv?String(Math.round(hv)):sl+"h",fill:Math.min(sl/9,1)};}},
  {key:"sleep",label:"Sleep",status(){const h=LIVE.health||{};const sl=parseFloat((h.sleep!=null?h.sleep:S.body.sleep))||0;let c=sl>=7.5?"go":sl>=6?"watch":"behind";return{cls:c,word:{go:"RESTED",watch:"SHORT",behind:"LOW"}[c],val:sl+"h",fill:Math.min(sl/9,1)};}},
  {key:"fuel",label:"Fuel",status(){const h=LIVE.health||{};const has=h.kcal!=null||h.protein!=null;return{cls:has?"go":"watch",word:has?"FUELED":"LOG IT",val:h.protein!=null?Math.round(h.protein)+"g":(h.kcal!=null?Math.round(h.kcal):"-"),fill:has?.7:.3};}},
  {key:"focus",label:"Focus",status(){const s=S.focus.sessions,g=S.focus.goal;let c=s>=g?"go":s>=1?"watch":"behind";return{cls:c,word:{go:"DIALED",watch:"WARMING",behind:"IDLE"}[c],val:s+"/"+g,fill:Math.min(s/g,1)};}},
  {key:"school",label:"School",status(){const o=schoolAll().filter(x=>!x.done);const ov=o.filter(x=>daysUntil(x.due)<0).length;const so=o.filter(x=>daysUntil(x.due)>=0&&daysUntil(x.due)<=2).length;const low=(LIVE.courses||[]).some(c=>c.score!=null&&c.score<80);let c=ov>0||low?"behind":so>0?"watch":"go";return{cls:c,word:{go:"ON TOP",watch:"DUE SOON",behind:low&&ov===0?"GRADES":"OVERDUE"}[c],val:o.length+"",fill:o.length?Math.min(o.length/6,1):(low?1:0.15)};}},
  {key:"mind",label:"Mind",status(){const n=(S.mind.windDown?1:0)+(S.mind.reflection?1:0);let c=n>=2?"go":n===1?"watch":"behind";return{cls:c,word:{go:"CLEAR",watch:"OK",behind:"UNSET"}[c],val:S.mind.mood+"/5",fill:S.mind.mood/5};}},
  {key:"create",label:"Create",status(){const a=S.create.filter(c=>c.stage!=="Idea"&&c.stage!=="Posted").length;const p=S.create.filter(c=>c.stage==="Posted").length;let c=a>0?"go":S.create.length>0?"watch":"behind";return{cls:c,word:{go:"SHIPPING",watch:"IN MOTION",behind:"STALLED"}[c],val:S.create.length+"",fill:S.create.length?(p+a)/S.create.length:0};}},
  {key:"reading",label:"Reading",status(){const m=S.reading.minutes;let c=m>0?"go":"behind";return{cls:c,word:{go:"READ",behind:"NOT YET"}[c],val:m+"m",fill:Math.min(m/30,1)};}},
  {key:"work",label:"Work",status(){const o=S.work.filter(x=>!x.done);const ov=o.filter(x=>daysUntil(x.due)<0).length;let c=ov>0?"behind":o.length?"watch":"go";return{cls:c,word:{go:"ON TRACK",watch:"ACTIVE",behind:"OVERDUE"}[c],val:o.length+"",fill:o.length?Math.min(o.length/6,1):0};}},
  {key:"care",label:"Care",status(){const am=S.care.am.every(x=>x.d),pm=S.care.pm.every(x=>x.d);let c=(am&&pm)?"go":(am||pm)?"watch":"behind";return{cls:c,word:{go:"KEPT",watch:"HALF",behind:"SKIPPED"}[c],val:streak(S.care.dates)+"d",fill:(S.care.am.filter(x=>x.d).length+S.care.pm.filter(x=>x.d).length)/(S.care.am.length+S.care.pm.length)};}},
  {key:"capture",label:"Inbox",status(){const n=S.capture.length;let c=n===0?"go":n<=4?"watch":"behind";return{cls:c,word:{go:"CLEAR",watch:"TO SORT",behind:"PILING UP"}[c],val:n+"",fill:n?Math.min(n/8,1):0};}},
  {key:"wins",label:"Wins",status(){const wk=S.wins.filter(w=>daysAgo(w.date)<=7).length;let c=wk>0?"go":"behind";return{cls:c,word:{go:"LOGGED",behind:"NONE YET"}[c],val:wk+"",fill:Math.min(wk/5,1)};}},
  {key:"money",label:"Money",status(){const m=S.money.subs.reduce((a,s)=>a+(s.cycle==="yr"?s.cost/12:Number(s.cost)||0),0);return{cls:"go",word:"STEADY",val:"$"+m.toFixed(0),fill:.6};}},
];

function ring(pct,cls,size,sw,centerHtml,anim){
  const r=(size-sw)/2, cx=size/2, circ=2*Math.PI*r, off=circ*(1-Math.max(0,Math.min(1,pct)));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="${sw}"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke-width="${sw}" stroke-linecap="round" class="ringprog rg-${cls} ${anim?'anim':''}" style="--circ:${circ};--off:${off};stroke-dasharray:${circ};stroke-dashoffset:${anim?circ:off};" transform="rotate(-90 ${cx} ${cx})"/>
  </svg>${centerHtml?`<div class="corecenter">${centerHtml}</div>`:""}`;
}
function spark(vals,cls){vals=(vals||[]).filter(v=>v!=null&&!isNaN(v)).slice(0,14).reverse();if(vals.length<2)return'';const w=160,h=36,pad=3;const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;const pts=vals.map((v,i)=>{const x=pad+i*(w-2*pad)/(vals.length-1);const y=h-pad-((v-mn)/rng)*(h-2*pad);return x.toFixed(1)+','+y.toFixed(1);}).join(' ');return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block;"><polyline points="${pts}" fill="none" stroke="var(--${cls})" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function trendChip(t,goodUp){if(!t||t.pct==null)return `<span class="trend flat">- no baseline</span>`;if(t.pct===0)return `<span class="trend flat">flat vs avg</span>`;const up=t.pct>0;const good=goodUp?up:!up;return `<span class="trend ${good?'go':'behind'}">${up?'▲':'▼'}${Math.abs(t.pct)}% vs avg</span>`;}
function metric(label,v,unit,t,goodUp){return `<div class="metric"><div class="lbl">${label}</div><div class="disp" style="font-size:26px;">${v!=null&&v!==""?Math.round(v*10)/10:'-'}<span class="lbl"> ${unit}</span></div>${trendChip(t,goodUp)}</div>`;}

function overall(){const sc={go:1,watch:.5,behind:0};const arr=AREAS.map(a=>sc[a.status().cls]);const pct=arr.reduce((x,y)=>x+y,0)/arr.length;const cl=AREAS.map(a=>a.status().cls);let cls=cl.includes("behind")?"behind":cl.filter(x=>x==="watch").length>=3?"watch":"go";let word=cls==="behind"?"NEEDS YOU":cls==="watch"?"STEADY":"DIALED IN";return{pct,cls,word};}
function renderHome(){
  const ov=overall();const call=S.call||"Tap brief me - I'll read every system and call the day.";
  const cards=AREAS.map(a=>{const st=a.status();return `<button class="acard ${st.cls}" onclick="go('${a.key}')"><div class="acard-top"><span class="alabel">${a.label}</span><span class="dot ${st.cls}"></span></div><div class="ringwrap" style="width:62px;height:62px;">${ring(st.fill,st.cls,62,5,`<div class="mini-center">${esc(st.val)}</div>`,false)}</div><div class="astate ${st.cls}">${st.word}</div></button>`;}).join("");
  return `<div class="core"><div class="coremeta">System status &middot; ${new Date().toLocaleDateString('en-US',{weekday:'long'})}</div><div class="ringwrap"><div class="glow glow-${ov.cls}"></div>${ring(ov.pct,ov.cls,188,9,`<div class="corepct">${Math.round(ov.pct*100)}</div><div class="coreword astate ${ov.cls}">${ov.word}</div>`,true)}</div><div class="callline">${esc(call)}</div><button class="brief" id="hbrief" onclick="brief()">◈ Brief me</button></div>
    <div class="gridhead"><span class="lbl">Where you stand</span><span class="lbl">${AREAS.length} systems</span></div>
    <div class="grid">${cards}</div>
    <button class="reviewbtn" onclick="go('review')">↗ Run weekly deep review</button>`;
}

function persist(){save();render();}
function addTo(list,obj){S[list].push(obj);persist();}
function rm(list,i){S[list].splice(i,1);persist();}
function dhead(title){return `<button class="back" onclick="go('home')">← Command</button><div class="dtitle">${title}</div>`;}
function coachBtn(area,label){return `<button class="coachbtn" onclick="coach('${area}')">◈ ${label}</button>`;}
function coachBox(area){const t=COACH[area];if(!t)return'';return `<div class="coachbox">${esc(t)}</div>`;}

function detail(key){const map={body:bodyView,sleep:sleepView,fuel:fuelView,focus:focusView,mind:mindView,create:createView,reading:readingView,capture:captureView,school:schoolView,work:workView,money:moneyView,care:careView,wins:winsView,overseer:overseerView,review:reviewView};return (map[key]||(()=>dhead("-")+`<div class="empty">Coming soon.</div>`))();}

function bodyView(){const b=S.body,h=LIVE.health,tr=LIVE.trends||{};

function snapshot(){
  const a=AREAS.map(x=>{const s=x.status();return `${x.label}: ${s.word} (${s.val})`;}).join("; ");
  const h=LIVE.health,tr=LIVE.trends||{};
  const courses=(LIVE.courses||[]).map(c=>c.name+(c.score!=null?` ${Math.round(c.score)}%`:'')).join(", ")||"none loaded";
  const sch=schoolAll().filter(x=>!x.done).map(x=>x.t+(x.due?` [due ${x.due}]`:"")).join(", ")||"none";
  const hrvT=tr.hrv&&tr.hrv.pct!=null?` (${tr.hrv.pct>0?'+':''}${tr.hrv.pct}% vs baseline)`:'';
  return `Standing - ${a}.
Body: ${h&&h.sleep!=null?h.sleep:S.body.sleep}h sleep, HRV ${h&&h.hrv!=null?Math.round(h.hrv):(S.body.hrv||'?')}${hrvT}, RHR ${h&&h.rhr!=null?Math.round(h.rhr):(S.body.rhr||'?')}, trained ${S.body.trained}.${h?' (live Apple Health)':''}
Fuel today: ${h&&h.kcal!=null?Math.round(h.kcal)+' kcal':'not logged'}${h&&h.protein!=null?', '+Math.round(h.protein)+'g protein':''}.
Classes & grades: ${courses}.
Open school: ${sch}.
Focus: ${S.focus.sessions}/${S.focus.goal}, one thing "${S.focus.oneThing||'unset'}", ${S.focus.distractions} distractions.
Reading: ${S.reading.book||'nothing set'}, ${S.reading.minutes}m today. Inbox: ${S.capture.length}. Care streak: ${streak(S.care.dates)}d.`;
}

function coachPrompt(area){
  const courses=(LIVE.courses||[]).map(c=>c.name+(c.score!=null?` (${Math.round(c.score)}%)`:'')).join(", ")||"not loaded";
  const sch=schoolAll().filter(x=>!x.done).map(x=>x.t+(x.due?` due ${x.due}`:"")).join("; ")||"none upcoming";
  const h=LIVE.health||{},tr=LIVE.trends||{};
  switch(area){
    case "body": return `${snapshot()}\n\nGive me today's recovery call: one word (PUSH / STEADY / RECOVER), one line why from my HRV/RHR/sleep vs my baseline, then 2 specific moves - training intensity today + one recovery lever. Fuel means eating enough, never restriction.`;
    case "sleep": return `My sleep last night: ${h.sleep!=null?h.sleep+'h':'unknown'}${tr.sleep&&tr.sleep.pct!=null?`, ${tr.sleep.pct>0?'+':''}${tr.sleep.pct}% vs my recent average`:''}. Give me 2 specific, doable things to improve tonight's sleep. No generic advice.`;
    case "fuel": return `My fuel today from Cronometer: ${h.kcal!=null?Math.round(h.kcal)+' kcal':'not logged yet'}, ${h.protein!=null?Math.round(h.protein)+'g protein':'protein unknown'}${h.carbs!=null?', '+Math.round(h.carbs)+'g carbs':''}. I train for strength. Am I eating ENOUGH to train and recover today, and what 2 things would help me fuel better? Never restriction, calorie-cutting, or weight talk - only fueling well.`;
    case "school": return `My classes and current grades: ${courses}. Upcoming work: ${sch}. For each class (especially anything under 85% or due soonest), give me a specific way to study it this week and 1-2 real free resources, named (e.g. Khan Academy for algebra, Paul's Online Math Notes for precalc). Concrete and prioritized. If it's summer with nothing due, give me a light way to stay sharp for next term instead.`;
    case "focus": return `${snapshot()}\n\nI keep procrastinating. My one thing today is "${S.focus.oneThing||'unset'}", I've done ${S.focus.sessions}/${S.focus.goal} sessions and caught ${S.focus.distractions} distractions. Name the single most important move to stop stalling and start, right now. Be direct, one concrete action.`;
    case "mind": return `${snapshot()}\n\nMood is ${S.mind.mood}/5. Read my day. Give me one grounding thing to do tonight and one honest observation. Warm but not soft.`;
    case "create": return `My content pipeline (Loose Ends docs + vlog): ${S.create.map(c=>c.t+" ["+c.stage+"]").join("; ")||"empty"}. I edit in Final Cut, do my own voiceover. What should I move forward next and the one concrete step to ship it? Push me to finish, not collect ideas.`;
    case "reading": return `I'm reading "${S.reading.book||'nothing set'}", ${S.reading.minutes} min today. Give me one nudge to keep the habit and one technique to actually retain what I read. Short.`;
    case "work": return `My StartLine / work next-actions: ${S.work.filter(x=>!x.done).map(x=>x.t+(x.due?" (due "+x.due+")":"")).join("; ")||"none"}. What's the single next move and why that one first?`;
    case "money": return `My subscriptions: ${S.money.subs.map(s=>s.name+" $"+s.cost+"/"+s.cycle).join(", ")||"none"}. Anything worth questioning? One honest line, no lecture.`;
    case "care": return `Skincare streak ${streak(S.care.dates)} days; today AM done: ${S.care.am.every(x=>x.d)}, PM done: ${S.care.pm.every(x=>x.d)}. One line of encouragement to keep the streak - no product upsell.`;
    case "wins": return `Recent wins: ${S.wins.slice(-6).map(w=>w.t).join("; ")||"none logged"}. Reflect back what's going well in one line and one thing to build on. Genuine, brief.`;
    case "capture": return `My inbox to sort: ${S.capture.map(c=>c.t).join("; ")||"empty"}. Help me triage - what to do first and what to drop. Short.`;
    default: return `${snapshot()}\n\nLook at my ${area} and give me one specific, useful move. Short.`;
  }
}
async function callApi(message){
  const r=await fetch("/api/overseer",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({message})});
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  return d.text||"No response.";
}
async function coach(area){COACH[area]="Reading your data...";render();try{const t=await callApi(coachPrompt(area));COACH[area]=t;if(autospeak)speak(t);}catch(e){COACH[area]="Couldn't reach the Overseer: "+e.message;}render();}
async function brief(){const btn=$('#hbrief');if(btn)btn.textContent="◈ Reading systems...";try{const t=await callApi("Brief me. "+snapshot()+"\n\nGive me ONE short paragraph: the call for today and the single most important move. Then a one-line PS on what's trending up or down.");S.call=t;S.briefing=t;save();if(autospeak)speak(t);}catch(e){S.call="Overseer offline: "+e.message;}render();}
async function brief2(){const btn=$('#ovb');if(btn)btn.textContent="Reading every system...";try{const t=await callApi("Full briefing. "+snapshot()+"\n\nGo system by system briefly: what's good, what needs me, and the top 3 moves for today in priority order. Tight.");S.briefing=t;save();if(autospeak)speak(t);}catch(e){S.briefing="Overseer offline: "+e.message;}render();}
async function ask(){const el=$('#ovm');if(!el)return;const q=el.value.trim();if(!q)return;S.briefing="Thinking...";render();try{const t=await callApi(q+"\n\nContext: "+snapshot());S.briefing=t;save();if(autospeak)speak(t);}catch(e){S.briefing="Overseer offline: "+e.message;}render();}
async function review(){const btn=$('#rvb');if(btn)btn.textContent="Thinking hard...";try{const hist=(LIVE.history||[]).slice(0,14).map(h=>`${h.at?h.at.slice(5,10):'?'}: sleep ${h.sleep==null?'-':h.sleep} hrv ${h.hrv==null?'-':h.hrv} rhr ${h.rhr==null?'-':h.rhr}`).join(" | ")||"no history yet";S.review="Reading your week...";render();const t=await callApi("Weekly deep review. "+snapshot()+"\n\nHealth history (recent first): "+hist+"\n\nGive me: 1) the honest headline on my week, 2) what's trending up, 3) what's slipping, 4) the ONE change for next week. Direct, no fluff.");S.review=t;save();if(autospeak)speak(t);}catch(e){S.review="Overseer offline: "+e.message;}render();}
function speak(t){try{if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(String(t).replace(/[*#`>_~]/g,''));u.rate=1.03;speechSynthesis.speak(u);}catch(e){}}
function listen(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Voice input isn't supported in this browser - type instead. (Spoken replies still work.)");return;}try{const r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=1;r.onresult=e=>{const tx=e.results[0][0].transcript;const el=$('#ovm');if(el){el.value=tx;ask();}};r.onerror=()=>{};r.start();}catch(e){}}

function go(key){view=key;const sc=$("#scroll");if(sc)sc.scrollTop=0;render();}
function render(){const sc=$("#scroll");if(!sc)return;sc.innerHTML=(view==="home")?renderHome():detail(view);renderNav();}
function renderNav(){const nav=$("#nav");const tabs=[["home","⌘","Command"],["capture","＋","Capture"],["overseer","◈","Overseer"]];nav.innerHTML=tabs.map(t=>{const k=t[0];const on=(view===k)||(k==='home'&&view!=='capture'&&view!=='overseer');return `<button class="${on?'on':''}" onclick="go('${k}')"><span class="ico">${t[1]}</span>${t[2]}</button>`;}).join("");}
function tick(){const c=$("#clock");if(c)c.textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
async function loadLive(){
  try{const r=await fetch("/api/health");const d=await r.json();if(d&&d.ok){LIVE.health=d.data||null;LIVE.history=d.history||[];LIVE.trends=d.trends||{};}}catch(e){}
  try{const r=await fetch("/api/canvas");const d=await r.json();if(d&&d.ok){if(Array.isArray(d.items))LIVE.canvas=d.items;if(Array.isArray(d.courses))LIVE.courses=d.courses;}}catch(e){}
  render();
}
tick();setInterval(tick,30000);
render();
loadLive();
</script>
</body>
